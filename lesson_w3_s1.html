<script>
window.LESSON_DATA = {
    id: 'w3s1',
    title: 'Derivatives',
    subtitle: 'Rate of change · Tangent line · Power rule',
    color: '#e74c3c',
    questions: [
        {
            type: 'tf',
            prompt: 'The derivative f\'(x) measures the instantaneous rate of change of f at the point x.',
            answer: true,
            explanation: 'Yes — the derivative is the limit of (f(x+h) − f(x))/h as h→0. Geometrically it is the slope of the tangent line to f at x. In ML, it tells us how fast the loss changes with respect to a weight.'
        },
        {
            type: 'mc',
            prompt: 'By the power rule, d/dx[x⁵] = ?',
            options: ['x⁴', '5x⁴', '5x⁵', '4x⁴'],
            answer: 1,
            explanation: 'd/dx[xⁿ] = n·xⁿ⁻¹. Bring the exponent down as a coefficient, reduce the exponent by 1. So d/dx[x⁵] = 5x⁴.'
        },
        {
            type: 'fill',
            before: 'Power rule: d/dx[xⁿ] = ',
            after: ' · xⁿ⁻¹',
            answer: 'n',
            explanation: 'The exponent n comes down as a multiplier and the power reduces by 1. This is the most-used differentiation rule — it covers polynomials entirely.'
        },
        {
            type: 'calc',
            prompt: 'd/dx[4x³] at x = 2 = ?',
            answer: 48,
            hint: 'First differentiate: d/dx[4x³] = 12x². Then substitute x=2.',
            explanation: 'd/dx[4x³] = 4 · 3x² = 12x². At x=2: 12 × 4 = 48. The derivative gives the slope of the tangent line to f(x)=4x³ at the point x=2.'
        },
        {
            type: 'mc',
            prompt: 'What is d/dx[eˣ]?',
            options: ['xeˣ⁻¹', 'eˣ', 'eˣ + x', '1/eˣ'],
            answer: 1,
            explanation: 'The exponential function is its own derivative: d/dx[eˣ] = eˣ. This unique self-referential property makes eˣ central to probability, statistics, and the analysis of growth in ML models.'
        },
        {
            type: 'mc',
            prompt: 'Geometrically, f\'(x₀) represents…',
            options: [
                'The area under f from 0 to x₀',
                'The slope of the tangent line to f at x₀',
                'The value f(x₀)',
                'The curvature of f at x₀'
            ],
            answer: 1,
            explanation: 'The derivative at a point is the slope of the tangent line at that point. A positive derivative means the curve is going up; negative means going down; zero means a flat point (potential minimum or maximum).'
        },
        {
            type: 'tf',
            prompt: 'The derivative of a constant (e.g. d/dx[7]) is 1.',
            answer: false,
            explanation: 'd/dx[c] = 0 for any constant c. A constant function is completely flat — it doesn\'t change, so its rate of change is zero. Common mistake: confusing the constant 1 from the power rule (d/dx[x] = 1) with d/dx[7] = 0.'
        },
        {
            type: 'calc',
            prompt: 'd/dx[3x² + 2x − 5] at x = 1 = ?',
            answer: 8,
            hint: 'Differentiate term-by-term: d/dx[3x²]=6x, d/dx[2x]=2, d/dx[5]=0',
            explanation: 'f\'(x) = 6x + 2. At x=1: f\'(1) = 6 + 2 = 8. The sum rule lets you differentiate term by term. This is a standard linear regression gradient calculation.'
        },
        {
            type: 'type',
            prompt: 'When f\'(x) = 0 at a point, that point is called a ___ point.',
            answer: 'critical',
            explanation: 'A critical point (also called a stationary point) is where the derivative is zero — the tangent is horizontal. These are candidates for local minima and maxima. Gradient descent converges to a critical point.'
        },
        {
            type: 'mc',
            prompt: 'What is d/dx[ln x]?',
            options: ['ln x', '1/(x·ln x)', '1/x', 'x·ln x'],
            answer: 2,
            explanation: 'd/dx[ln x] = 1/x (for x > 0). This is fundamental in ML — the log-likelihood of many models contains ln terms, and computing gradients requires this rule constantly.'
        },
        {
            type: 'tf',
            prompt: 'If f\'\'(x₀) > 0, then x₀ is a local minimum of f.',
            answer: false,
            explanation: 'Not necessarily. f\'\'(x₀) > 0 means f is concave up at x₀ (bowl shape), which is consistent with a local minimum — but only if f\'(x₀) = 0 as well. If f\'(x₀) ≠ 0, x₀ is neither a min nor a max.'
        },
        {
            type: 'calc',
            prompt: 'd/dx[x² + 5x] at x = 3 = ?',
            answer: 11,
            hint: 'f\'(x) = 2x + 5, then substitute x=3',
            explanation: 'f\'(x) = 2x + 5. At x=3: f\'(3) = 6 + 5 = 11. The derivative of a sum is the sum of derivatives (sum rule).'
        }
    ]
};
</script>
