<script>
window.LESSON_DATA = {

    title: 'Matrix Inverse',
    subtitle: 'A⁻¹ · When it exists · Why it matters',
    color: '#2c3e50',
    questions: [
        {
            type: 'mc',
            prompt: 'If Ax = b, the solution for x is…',
            options: ['x = Ab', 'x = A⁻¹b', 'x = b / A', 'x = b − A'],
            answer: 1,
            explanation: 'Multiply both sides on the left by A⁻¹: A⁻¹Ax = A⁻¹b → Ix = A⁻¹b → x = A⁻¹b. The inverse undoes whatever A did to x.'
        },
        {
            type: 'mc',
            prompt: 'Under what condition does the matrix inverse A⁻¹ exist?',

                'When the matrix is symmetric'

            answer: 1,
            explanation: 'The inverse exists if and only if det(A) ≠ 0. This is equivalent to: non-singular, full rank, no linear dependence. Being square is necessary but not sufficient — a square matrix can still be singular.'
        },
        {
            type: 'calc',
            prompt: 'A = [[2, 0], [0, 3]]. Calculate det(A).',
            answer: 6,
            hint: 'det([[a,b],[c,d]]) = ad − bc',
            explanation: 'det = (2)(3) − (0)(0) = 6. Since det ≠ 0, A is invertible. For diagonal matrices, the determinant is just the product of diagonal entries, confirming invertibility quickly.'
        },
        {
            type: 'tf',
            prompt: 'Every square matrix has an inverse.',
            answer: false,
            explanation: 'A square matrix with det = 0 (singular) has no inverse. The transformation has destroyed a dimension — once that information is gone, you cannot reconstruct the original input from the output.'
        },
        {
            type: 'visual',
            visual: '<svg width="240" height="155" viewBox="0 0 240 155" xmlns="http://www.w3.org/2000/svg" style="background:#f8fafc;border-radius:10px;border:1.5px solid #e1e8ed"><text x="120" y="18" font-size="10" fill="#7f8c8d" font-family="sans-serif" text-anchor="middle">Gauss-Jordan: [A | I] → [I | A⁻¹]</text><text x="20" y="38" font-size="10" fill="#7f8c8d" font-family="sans-serif">Start [A | I]:</text><text x="20" y="58" font-size="12" fill="#2c3e50" font-family="monospace">[ 2  0 | 1  0 ]</text><text x="20" y="76" font-size="12" fill="#2c3e50" font-family="monospace">[ 0  4 | 0  1 ]</text><line x1="20" y1="90" x2="220" y2="90" stroke="#e1e8ed" stroke-width="1"/><text x="20" y="108" font-size="10" fill="#27ae60" font-family="sans-serif">Result [I | A⁻¹]:</text><text x="20" y="126" font-size="12" fill="#27ae60" font-family="monospace">[ 1  0 | ½  0 ]</text><text x="20" y="144" font-size="12" fill="#27ae60" font-family="monospace">[ 0  1 | 0  ¼ ]</text></svg>',
            type: 'mc',
            prompt: 'The Gauss-Jordan method computes A⁻¹ by augmenting A with the identity matrix [A | I] and reducing to [I | A⁻¹]. In the result above, what is A⁻¹[0][0]?',
            options: ['2', '1', '½', '¼'],
            answer: 2,
            explanation: 'The top-left of A⁻¹ is ½. For A = diag(2, 4), A⁻¹ = diag(1/2, 1/4) — each diagonal entry inverts. Gauss-Jordan systematically row-reduces both sides simultaneously until A becomes I.'
        },
        {
            type: 'calc',
            prompt: 'For A = [[1, 0], [0, 2]], the entry A⁻¹[1][1] = ?',

                'There is no meaningful difference'

        {
            type: 'type',
            prompt: 'A transformation that permanently loses a dimension (like squashing 3D to a flat plane) cannot be ___ — the lost information is gone forever.',

            explanation: 'This is why singular matrices have no inverse. It\'s like trying to reconstruct a 3D object from its 2D shadow — the depth information is gone and the inversion is impossible.'

        {

                'You get the zero matrix',
                'You get the transpose of A'

            explanation: 'Division by det(A) = 0 is undefined — the formula collapses. This algebraically confirms what the geometric argument says: a singular matrix cannot be inverted. The formula is only valid when det ≠ 0.'
        }
