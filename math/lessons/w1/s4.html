    <title>Lesson: Independence &amp; Rank</title>

<body>
<script>
window.LESSON_DATA = {
    id: 'w1s4',
    title: 'Independence & Rank',
    subtitle: 'Linear dependence · Rank · Null space',
    color: '#c0392b',
    questions: [
        {
            type: 'type',
            prompt: 'If one equation is a scaled copy of another, the two equations are linearly ___.',
            answer: 'dependent',
            explanation: 'Linear dependence means one equation provides zero new information — it points in the exact same geometric direction as another. It adds no new constraint and the system collapses.'
        },
        {
            type: 'mc',
            prompt: 'What does the rank of a matrix measure?',
            options: [
                'The total number of rows in the matrix',
                'The number of non-zero entries',
                'The number of genuinely independent (non-redundant) equations',
                'The value of the determinant'
            ],
            answer: 2,
            explanation: 'Rank counts only the equations that add real new information — a new geometric direction. It is the true dimensionality of the data, which may be lower than the number of rows.'
        },
        {
            type: 'calc',
            prompt: 'Matrix A = [[1, 2], [2, 4]]. What is rank(A)?',
            answer: 1,
            hint: 'Check if row 2 is a multiple of row 1',
            explanation: 'Row 2 = 2 × Row 1 → they are linearly dependent → only 1 independent row → rank = 1. A 2×2 matrix with rank 1 is singular (det = 0, no inverse).'
        },
        {
            type: 'tf',
            prompt: 'A 3×3 matrix with rank 3 is non-singular and has a unique solution.',
            answer: true,
            explanation: 'Rank 3 in a 3×3 system means all three equations are independent — full rank. This guarantees a unique solution, a non-zero determinant, and an invertible matrix.'
        },
        {
            type: 'visual',
            visual: '<svg width="230" height="145" viewBox="0 0 230 145" xmlns="http://www.w3.org/2000/svg" style="background:#f8fafc;border-radius:10px;border:1.5px solid #e1e8ed"><text x="55" y="15" font-size="10" fill="#7f8c8d" font-family="sans-serif" text-anchor="middle">Independent</text><line x1="55" y1="125" x2="80" y2="55" stroke="#2980b9" stroke-width="2.5" stroke-linecap="round"/><polygon points="80,55 73,64 77,71" fill="#2980b9"/><text x="83" y="55" font-size="10" fill="#2980b9" font-family="sans-serif">a</text><line x1="55" y1="125" x2="100" y2="100" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/><polygon points="100,100 89,99 91,110" fill="#e74c3c"/><text x="104" y="100" font-size="10" fill="#e74c3c" font-family="sans-serif">b</text><line x1="115" y1="10" x2="115" y2="140" stroke="#e1e8ed" stroke-width="1" stroke-dasharray="4"/><text x="172" y="15" font-size="10" fill="#7f8c8d" font-family="sans-serif" text-anchor="middle">Dependent</text><line x1="145" y1="125" x2="185" y2="55" stroke="#2980b9" stroke-width="2.5" stroke-linecap="round"/><polygon points="185,55 178,64 182,71" fill="#2980b9"/><text x="188" y="55" font-size="10" fill="#2980b9" font-family="sans-serif">a</text><line x1="145" y1="125" x2="165" y2="90" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/><polygon points="165,90 158,97 163,103" fill="#e74c3c"/><text x="168" y="88" font-size="10" fill="#e74c3c" font-family="sans-serif">b</text></svg>',
            type: 'mc',
            prompt: 'In the right diagram (Dependent), b is a shorter version of a — same direction. What does this tell us?',
            options: [
                'b = a, so they span 2D space',
                'b is a scalar multiple of a — they span only 1D (a line), not a full 2D plane',
                'The rank of the matrix formed by [a, b] is 2',
                'b adds a new direction to the space'
            ],
            answer: 1,
            explanation: 'If b = c·a for some scalar c, they point the same direction. Two such vectors can\'t span 2D space — they only span a 1D line. Rank of the matrix [a b] is 1, not 2.'
        },
        {
            type: 'mc',
            prompt: 'A dataset includes both "Temperature in °C" and "Temperature in °F" as features. What problem does this cause?',
            options: [
                'The model trains faster',
                'Perfect linear dependence — the columns are redundant, rank drops, matrix becomes singular',
                'The features become orthogonal',
                'No problem — more features always help'
            ],
            answer: 1,
            explanation: 'F = 1.8C + 32 is a perfect linear relationship. The two feature columns are linearly dependent — one can be derived from the other. Rank drops, det → 0, and matrix operations become unstable.'
        },
        {
            type: 'calc',
            prompt: 'What is rank(I₃), the rank of the 3×3 identity matrix?',
            answer: 3,
            hint: 'How many rows are linearly independent?',
            explanation: 'The identity matrix has e₁=[1,0,0], e₂=[0,1,0], e₃=[0,0,1] — three completely independent rows pointing in distinct directions. rank(I₃) = 3, meaning it is full rank and invertible.'
        },
        {
            type: 'fill',
            before: 'A matrix where rank equals the number of rows is called ',
            after: ' rank.',
            answer: 'full',
            explanation: 'Full rank = every row (equation) is genuinely independent. This is the "healthy" state: all constraints point in new directions, and a unique solution exists.'
        },
        {
            type: 'mc',
            prompt: 'A 3×3 system has rank 2. What does this tell you?',
            options: [
                'All three equations are independent — unique solution guaranteed',
                'One equation is redundant — no unique solution (infinite or none)',
                'The determinant is 2',
                'Two equations are zero'
            ],
            answer: 1,
            explanation: 'Rank 2 in a 3×3 means one equation is redundant (linearly dependent on the others). The system is rank-deficient → singular → no unique solution.'
        },
        {
            type: 'tf',
            prompt: 'The zero vector can be part of a linearly independent set.',
            answer: false,
            explanation: 'The zero vector is always linearly dependent — it can be written as 0 × (any vector). Including it in a set immediately makes the set linearly dependent, reducing rank.'
        },
        {
            type: 'fill',
            before: 'The set of all x satisfying Ax = 0 is called the ',
            after: ' space of A.',
            answer: 'null',
            explanation: 'The null space (kernel) contains all inputs x that A squashes to zero. If the null space contains only x = 0, the matrix is full rank and invertible. A non-trivial null space means rank deficiency.'
        },
        {
            type: 'tf',
            prompt: 'Linear dependence always results in no solution.',
            answer: false,
            explanation: 'Linear dependence causes singularity, but the exact failure mode depends on the right-hand side. Dependent equations with consistent right-hand sides → infinite solutions. With contradictory RHS → no solution.'
        },
        {
            type: 'mc',
            prompt: 'A matrix has rank r. How many pivot columns does its RREF have?',
            options: ['r − 1', 'r', 'r + 1', 'It depends on the matrix size'],
            answer: 1,
            explanation: 'The number of pivot columns in RREF equals the rank exactly. Each pivot represents one independent equation. The remaining (n − r) columns are free variables, corresponding to the null space dimensions.'
        }
    ]
};
</script>
