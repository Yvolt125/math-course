<script>
window.LESSON_DATA = {
    id: 'w3s5',
    title: 'Loss Functions',
    subtitle: 'MSE · Cross-entropy · Why they exist',
    color: '#16a085',
    questions: [
        {
            type: 'type',
            prompt: 'MSE stands for Mean ___ Error — the average of squared differences between predictions and true values.',
            answer: 'squared',
            explanation: 'MSE = (1/n)Σ(ŷᵢ − yᵢ)². Squaring serves two purposes: makes errors positive (so positive and negative errors don\'t cancel), and penalises large errors disproportionately.'
        },
        {
            type: 'mc',
            prompt: 'Why does MSE penalise large errors more heavily than MAE (Mean Absolute Error)?',
            options: [
                'MSE uses logarithms to amplify errors',
                'Errors are squared — a 10× larger error gives 100× the loss',
                'MSE divides by a smaller constant',
                'MSE only counts errors above a threshold'
            ],
            answer: 1,
            explanation: 'Squaring is non-linear. If one residual is 10× another: (10e)² = 100e² vs |10e| = 10|e|. MSE "cares" 10× more about the larger error, making it sensitive to outliers. MAE treats all errors proportionally.'
        },
        {
            type: 'calc',
            prompt: 'Predictions = [3, 5], true values = [2, 4]. Calculate MSE.',
            answer: 1,
            hint: 'MSE = (1/n)Σ(ŷᵢ − yᵢ)²',
            explanation: 'Errors: (3−2)²=1, (5−4)²=1. MSE = (1+1)/2 = 1. Both predictions are off by exactly 1, so MSE = 1. If one error were 3, MSE would jump to (9+1)/2 = 5.'
        },
        {
            type: 'tf',
            prompt: 'MSE is differentiable everywhere, while MAE has a non-differentiable point at zero error.',
            answer: true,
            explanation: 'MSE = (ŷ−y)² is smooth everywhere — the derivative 2(ŷ−y) is well-defined. MAE = |ŷ−y| has a sharp corner (kink) at ŷ=y where the derivative is undefined. Gradient-based optimisation requires differentiability.'
        },
        {
            type: 'mc',
            prompt: 'Cross-entropy loss is used primarily for…',
            options: ['Regression problems', 'Classification problems', 'Dimensionality reduction', 'Clustering'],
            answer: 1,
            explanation: 'Cross-entropy measures the difference between a predicted probability distribution and the true (one-hot) distribution. Binary cross-entropy: L = −[y·log(ŷ) + (1−y)·log(1−ŷ)]. Perfect for classification outputs.'
        },
        {
            type: 'calc',
            prompt: 'One sample: ŷ = 5, y = 2. What is the squared error for this sample?',
            answer: 9,
            hint: '(ŷ − y)²',
            explanation: '(5 − 2)² = 3² = 9. MSE over n samples is the average of these squared errors. This large value (vs |5−2|=3 for MAE) shows why MSE is more sensitive to large residuals.'
        },
        {
            type: 'mc',
            prompt: 'Why is the log function used in cross-entropy loss?',
            options: [
                'To make computation faster',
                'To heavily penalise confident wrong predictions — log(ŷ) → −∞ as ŷ → 0',
                'To normalise the output to [0, 1]',
                'To avoid dividing by zero'
            ],
            answer: 1,
            explanation: 'When ŷ ≈ 0 but y = 1, log(ŷ) → −∞ — infinite loss for a completely wrong confident prediction. This forces the model to be properly calibrated. The log also connects to maximum likelihood estimation.'
        },
        {
            type: 'fill',
            before: 'The statistical justification for MSE is that minimising MSE is equivalent to ___ the log-likelihood under a Gaussian noise model.',
            after: '',
            answer: 'maximising',
            explanation: 'If you assume errors ε = y − ŷ ~ N(0, σ²), maximising the log-likelihood of the data gives exactly minimising MSE. This makes MSE the "natural" loss for regression with normally distributed noise.'
        },
        {
            type: 'calc',
            prompt: 'Predictions [4, 6], true values [2, 4]. Calculate MSE.',
            answer: 4,
            hint: 'Squared errors: (4−2)²=4, (6−4)²=4. Average them.',
            explanation: 'MSE = ((4−2)² + (6−4)²)/2 = (4+4)/2 = 4. Both predictions are off by 2, so squared errors are 4 each and MSE = 4.'
        },
        {
            type: 'mc',
            prompt: 'For regression with large outliers in the data, which loss function is more robust?',
            options: [
                'MSE — because squared errors are smaller',
                'MAE — because it doesn\'t amplify outliers by squaring',
                'Cross-entropy — because it uses log',
                'Neither — outliers must be removed first'
            ],
            answer: 1,
            explanation: 'MAE treats all errors proportionally, so outliers (large errors) don\'t dominate the loss. MSE squares errors, making a single outlier with error 100 contribute 10,000 to the loss — often overwhelming all other samples.'
        },
        {
            type: 'type',
            prompt: 'The formula L = −Σ[yᵢ log(ŷᵢ)] is called ___ entropy loss.',
            answer: 'cross',
            explanation: 'Cross-entropy: L = −Σ yᵢ log(ŷᵢ). For binary classification: L = −[y·log(ŷ) + (1−y)·log(1−ŷ)]. It measures how many "bits" of information separate the predicted distribution from the true distribution.'
        },
        {
            type: 'tf',
            prompt: 'RMSE (Root Mean Squared Error) has the same units as the target variable y.',
            answer: true,
            explanation: 'RMSE = √MSE. Since MSE is in squared units (e.g. metres²), √MSE returns units of metres. This makes RMSE easier to interpret: "predictions are off by X metres on average."'
        }
    ]
};
</script>
