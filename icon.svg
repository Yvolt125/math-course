<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a252f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded Background -->
  <rect width="100" height="100" rx="22" fill="url(#grad)"/>
  
  <!-- Stylized Mountain (The Hill) -->
  <path d="M 20 80 L 50 30 L 80 80 Z" fill="#2c3e50" />
  <path d="M 50 30 L 80 80 L 50 80 Z" fill="#243442" />
  
  <!-- The "Hub" / Boulder (Glow effect) -->
  <circle cx="50" cy="30" r="8" fill="#e74c3c" />
  <circle cx="50" cy="30" r="12" fill="#e74c3c" fill-opacity="0.2" />
  
  <!-- Ascent Path -->
  <path d="M 25 75 Q 40 60 50 30" stroke="#ecf0f1" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="4 4" />
</svg>
