<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#1a252f"/>
  
  <!-- The Hill -->
  <path d="M 10 90 L 90 40 L 90 90 Z" fill="#2c3e50"/>
  
  <!-- The Boulder -->
  <circle cx="65" cy="45" r="12" fill="#ecf0f1"/>
  
  <!-- Sisyphus (Stick Figure) -->
  <g stroke="#ecf0f1" stroke-width="3" stroke-linecap="round" fill="none">
    <!-- Body -->
    <line x1="50" y1="65" x2="58" y2="55" />
    <!-- Legs -->
    <line x1="50" y1="65" x2="45" y2="75" />
    <line x1="50" y1="65" x2="55" y2="75" />
    <!-- Arms pushing -->
    <line x1="58" y1="55" x2="62" y2="50" />
    <!-- Head -->
    <circle cx="55" cy="52" r="3" fill="#ecf0f1" stroke="none"/>
  </g>
</svg>
