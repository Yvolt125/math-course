<script>
window.LESSON_DATA = {
    id: 'w2s8',
    title: 'NumPy & scikit-learn',
    subtitle: 'eig · svd · cov · PCA in code',
    color: '#27ae60',
    questions: [
        {
            type: 'mc',
            prompt: 'Which NumPy function should you use for eigendecomposition of a symmetric matrix (guaranteeing real results)?',
            options: ['np.linalg.eig()', 'np.linalg.eigh()', 'np.linalg.svd()', 'np.linalg.det()'],
            answer: 1,
            explanation: 'np.linalg.eigh() is optimised for symmetric/Hermitian matrices and always returns real eigenvalues in sorted order. np.linalg.eig() works on any matrix but may return complex numbers even when real eigenvalues exist.'
        },
        {
            type: 'fill',
            before: 'Dot product / matrix multiplication in NumPy: A ',
            after: ' b',
            answer: '@',
            explanation: 'The @ operator (or np.matmul) performs matrix multiplication. np.dot() also works but @ is cleaner. For vectors, a @ b gives the scalar dot product. Do not confuse with *, which is element-wise.'
        },
        {
            type: 'type',
            prompt: 'To compute the length (magnitude) of vector v in NumPy, use np.linalg._____(v).',
            answer: 'norm',
            explanation: 'np.linalg.norm(v) returns ‖v‖ = √(v₁² + v₂² + … + vₙ²). Divide by norm to get a unit vector: v_hat = v / np.linalg.norm(v). Used in cosine similarity, projections, and normalisation.'
        },
        {
            type: 'mc',
            prompt: 'np.cov(X.T) computes the covariance matrix. Why is the transpose .T needed?',
            options: [
                'To make the matrix square',
                'np.cov expects features as rows; X.T puts each feature in its own row',
                'To improve numerical stability',
                'It is not needed — np.cov(X) works the same way'
            ],
            answer: 1,
            explanation: 'np.cov() treats each row as a variable. A dataset X is (n_samples × n_features) — taking X.T makes it (n_features × n_samples), so np.cov computes the p×p feature covariance matrix correctly.'
        },
        {
            type: 'mc',
            prompt: 'What does np.linalg.svd(X) return?',
            options: [
                'The eigenvalues of X only',
                'Three matrices U, Σ, Vᵀ where X = UΣVᵀ',
                'The inverse of X',
                'The covariance matrix of X'
            ],
            answer: 1,
            explanation: 'SVD decomposes X into U (left singular vectors), Σ (singular values — always real and non-negative), and Vᵀ (right singular vectors). The columns of V are the principal component directions used in PCA.'
        },
        {
            type: 'tf',
            prompt: 'from sklearn.decomposition import PCA; PCA(n_components=0.95) automatically selects the number of components needed to explain 95% of variance.',
            answer: true,
            explanation: 'Passing a float between 0 and 1 to n_components tells sklearn to choose the minimum number of components that explain at least that fraction of total variance. Very practical for real-world dimensionality reduction.'
        },
        {
            type: 'type',
            prompt: 'To fit and project data in one step with sklearn PCA, use pca.___________(X).',
            answer: ['fit_transform', 'fit transform'],
            explanation: 'pca.fit_transform(X) centres the data, computes the covariance, finds the top-k eigenvectors (via SVD), and projects X — all in one call. pca.explained_variance_ratio_ then gives the proportion of variance each component captures.'
        }
    ]
};
