<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Exercise Tracker — Study Hub</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#c0392b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="../icon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #2c3e50;
    }

    header {
      background: #c0392b;
      color: white;
      padding: 24px 20px;
      text-align: center;
      position: relative;
    }
    header h1 { font-size: 1.2em; letter-spacing: 1px; text-transform: uppercase; }
    .back {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: white; text-decoration: none; font-size: 0.9em; opacity: 0.8;
    }

    .nav-tabs {
      display: flex;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .nav-tab {
      flex: 1;
      text-align: center;
      padding: 15px;
      font-size: 0.9em;
      font-weight: 600;
      color: #7f8c8d;
      border-bottom: 3px solid transparent;
      cursor: pointer;
    }
    .nav-tab.active {
      color: #c0392b;
      border-bottom-color: #c0392b;
    }

    .container {
      flex: 1;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
    }

    .view { display: none; }
    .view.active { display: block; }

    /* Tracker UI */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 25px;
    }
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .stat-value { font-size: 1.8em; font-weight: 700; color: #c0392b; display: block; }
    .stat-label { font-size: 0.75em; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }

    .btn-main {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 50px;
      font-size: 1.1em;
      font-weight: 700;
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 15px;
    }
    .btn-start { background: #27ae60; }
    .btn-stop { background: #c0392b; }
    .btn-secondary { background: #ecf0f1; color: #7f8c8d; border: none; border-radius: 8px; cursor: pointer; }

    /* Gym UI */
    .gym-form {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .gym-form select, .gym-form input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1em;
      background: #fff;
    }
    .exercise-list { list-style: none; }
    .exercise-item {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .exercise-info h4 { font-size: 1em; margin-bottom: 4px; }
    .exercise-info p { font-size: 0.85em; color: #7f8c8d; }

    .history-card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      border-left: 4px solid #c0392b;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7em;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .badge-run { background: #eafaf1; color: #27ae60; }
    .badge-bike { background: #eaf4fb; color: #2980b9; }
    .badge-walk { background: #fef9e7; color: #f39c12; }
    .badge-gym { background: #fdedec; color: #c0392b; }

    #gps-status {
      text-align: center;
      font-size: 0.7em;
      color: #bdc3c7;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<!-- Hidden silent audio loop to keep background alive -->
<audio id="silent-audio" loop>
  <source src="data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" type="audio/wav">
</audio>

<header>
  <a class="back" href="../index.html">← Hub</a>
  <h1>Exercise</h1>
</header>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="showView('tracker')">Tracker</div>
  <div class="nav-tab" onclick="showView('gym')">Gym</div>
  <div class="nav-tab" onclick="showView('history')">History</div>
</div>

<div class="container">

  <!-- TRACKER VIEW -->
  <div id="view-tracker" class="view active">
    <div style="text-align: center; margin-bottom: 20px;">
      <select id="activity-type" style="padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; font-weight: 600;">
        <option value="run">🏃‍♂️ Running</option>
        <option value="bike">🚴‍♂️ Biking</option>
        <option value="walk">🚶‍♂️ Walking</option>
      </select>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <span id="display-distance" class="stat-value">0.00</span>
        <span class="stat-label">km</span>
      </div>
      <div id="timer" class="stat-card">
        <span id="display-time" class="stat-value">00:00</span>
        <span class="stat-label">Time</span>
      </div>
      <div class="stat-card">
        <span id="display-speed" class="stat-value">0.0</span>
        <span class="stat-label">km/h</span>
      </div>
      <div class="stat-card">
        <span id="display-pace" class="stat-value">0:00</span>
        <span class="stat-label">min/km</span>
      </div>
    </div>

    <button id="btn-toggle" class="btn-main btn-start" onclick="toggleTracking()">Start Session</button>
    <div id="gps-status">GPS Signal: Standby</div>
  </div>

  <!-- GYM VIEW -->
  <div id="view-gym" class="view">
    <div class="gym-form">
      <h3 style="margin-bottom: 15px; font-size: 1.1em;">Log Set</h3>
      
      <label style="font-size: 0.75em; color: #7f8c8d; display: block; margin-bottom: 5px;">EXERCISE</label>
      <select id="gym-exercise">
        <optgroup label="Chest">
          <option value="Bench Press">Bench Press</option>
          <option value="Incline Press">Incline Press</option>
          <option value="Chest Fly">Chest Fly</option>
          <option value="Push Ups">Push Ups</option>
        </optgroup>
        <optgroup label="Back">
          <option value="Pull Ups">Pull Ups</option>
          <option value="Lat Pulldown">Lat Pulldown</option>
          <option value="Seated Row">Seated Row</option>
          <option value="Deadlift">Deadlift</option>
        </optgroup>
        <optgroup label="Legs">
          <option value="Squat">Squat</option>
          <option value="Leg Press">Leg Press</option>
          <option value="Lunges">Lunges</option>
          <option value="Leg Curl">Leg Curl</option>
        </optgroup>
        <optgroup label="Arms/Shoulders">
          <option value="Overhead Press">Overhead Press</option>
          <option value="Lateral Raise">Lateral Raise</option>
          <option value="Bicep Curl">Bicep Curl</option>
          <option value="Tricep Extension">Tricep Extension</option>
        </optgroup>
      </select>

      <div style="display: flex; gap: 15px; margin-bottom: 15px;">
        <div style="flex: 1;">
          <label style="font-size: 0.75em; color: #7f8c8d; display: block; margin-bottom: 5px;">WEIGHT (KG)</label>
          <div style="display: flex; align-items: center; gap: 5px;">
            <button class="btn-secondary" style="padding: 10px; font-weight: bold; flex: 1;" onclick="adjustValue('gym-weight', -2.5)">-</button>
            <input type="number" id="gym-weight" value="40" step="2.5" style="margin: 0; text-align: center; flex: 2;">
            <button class="btn-secondary" style="padding: 10px; font-weight: bold; flex: 1;" onclick="adjustValue('gym-weight', 2.5)">+</button>
          </div>
        </div>
        <div style="flex: 1;">
          <label style="font-size: 0.75em; color: #7f8c8d; display: block; margin-bottom: 5px;">REPS</label>
          <div style="display: flex; align-items: center; gap: 5px;">
            <button class="btn-secondary" style="padding: 10px; font-weight: bold; flex: 1;" onclick="adjustValue('gym-reps', -1)">-</button>
            <input type="number" id="gym-reps" value="10" style="margin: 0; text-align: center; flex: 2;">
            <button class="btn-secondary" style="padding: 10px; font-weight: bold; flex: 1;" onclick="adjustValue('gym-reps', 1)">+</button>
          </div>
        </div>
      </div>

      <button class="btn-main btn-start" style="padding: 15px; margin-bottom: 0;" onclick="addGymSet()">Add Set</button>
    </div>

    <div id="current-gym-session">
      <h3 style="margin-bottom: 10px; font-size: 1em;">Current Session</h3>
      <ul id="gym-session-list" class="exercise-list">
        <!-- Sets added here -->
      </ul>
      <button id="btn-finish-gym" class="btn-main btn-stop" style="display: none; margin-top: 15px;" onclick="finishGymSession()">Finish & Save Session</button>
    </div>
  </div>

  <!-- HISTORY VIEW -->
  <div id="view-history" class="view">
    <h3 style="margin-bottom: 15px;">Recent Activities</h3>
    <div id="history-list">
      <!-- History items injected here -->
    </div>
    <button class="btn-main btn-stop" style="background: #7f8c8d; font-size: 0.8em; padding: 10px;" onclick="clearHistory()">Clear All Data</button>
  </div>

</div>

<script>
  // --- STATE ---
  let isTracking = false;
  let startTime = null;
  let timerInterval = null;
  let watchId = null;
  let distance = 0; // meters
  let path = []; // array of {lat, lon}
  let currentGymSession = [];

  // --- NAVIGATION ---
  function showView(viewName) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`view-${viewName}`).classList.add('active');
    document.querySelector(`.nav-tab[onclick="showView('${viewName}')"]`).classList.add('active');
    
    if (viewName === 'history') renderHistory();
  }

  // --- TRACKER LOGIC ---
  function toggleTracking() {
    const audio = document.getElementById('silent-audio');
    
    if (!isTracking) {
      if (!navigator.geolocation) {
        alert("GPS not supported on this device.");
        return;
      }

      isTracking = true;
      startTime = Date.now();
      distance = 0;
      path = [];
      
      document.getElementById('btn-toggle').innerText = "Finish Session";
      document.getElementById('btn-toggle').classList.replace('btn-start', 'btn-stop');
      document.getElementById('gps-status').innerText = "GPS Signal: Searching...";

      audio.play().catch(e => console.log("Audio start error:", e));

      timerInterval = setInterval(updateTimer, 1000);

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          updatePosition(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
        },
        (err) => {
          console.error(err);
          document.getElementById('gps-status').innerText = "GPS Error: " + err.message;
        },
        { enableHighAccuracy: true, maximumAge: 1000 }
      );
    } else {
      isTracking = false;
      clearInterval(timerInterval);
      navigator.geolocation.clearWatch(watchId);

      audio.pause();
      audio.currentTime = 0;

      const type = document.getElementById('activity-type').value;
      const finalTime = Math.floor((Date.now() - startTime) / 1000);
      const finalDist = (distance / 1000).toFixed(2);

      if (distance > 5) {
        saveActivity({
          type: type,
          date: new Date().toISOString(),
          distance: finalDist,
          duration: finalTime,
          avgSpeed: (finalDist / (finalTime / 3600)).toFixed(1)
        });
      }

      document.getElementById('btn-toggle').innerText = "Start Session";
      document.getElementById('btn-toggle').classList.replace('btn-stop', 'btn-start');
      document.getElementById('gps-status').innerText = "GPS Signal: Standby";
      resetStats();
      showView('history');
    }
  }

  function updatePosition(lat, lon, accuracy) {
    // Increased tolerance for indoor/low signal tracking
    if (accuracy > 60) {
      document.getElementById('gps-status').innerText = "Low Accuracy (" + Math.round(accuracy) + "m)";
      return;
    }
    document.getElementById('gps-status').innerText = "GPS Signal: OK (" + Math.round(accuracy) + "m)";

    const newPoint = { lat, lon };
    if (path.length > 0) {
      const prevPoint = path[path.length - 1];
      const d = haversine(prevPoint.lat, prevPoint.lon, newPoint.lat, newPoint.lon);
      
      // Increased sensitivity: count if moved > 1m (was 2m)
      const timeDiff = 1;
      const speed = (d / timeDiff) * 3.6;
      if (d > 1 && speed < 40) {
        distance += d;
        updateStats();
      }
    }
    path.push(newPoint);
  }

  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;
    const Δφ = (lat2-lat1) * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
              Math.cos(φ1) * Math.cos(φ2) *
              Math.sin(Δλ/2) * Math.sin(Δλ/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

  function updateTimer() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('display-time').innerText = formatTime(elapsed);
    updateStats();
  }

  function updateStats() {
    const distKm = distance / 1000;
    document.getElementById('display-distance').innerText = distKm.toFixed(2);
    
    const elapsedSec = (Date.now() - startTime) / 1000;
    if (elapsedSec > 0 && distKm > 0) {
      const speed = (distKm / (elapsedSec / 3600)).toFixed(1);
      const pace = (elapsedSec / 60) / distKm;
      
      document.getElementById('display-speed').innerText = speed;
      document.getElementById('display-pace').innerText = formatPace(pace);
    }
  }

  function formatTime(sec) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
  }

  function formatPace(minPerKm) {
    const m = Math.floor(minPerKm);
    const s = Math.floor((minPerKm - m) * 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  function resetStats() {
    document.getElementById('display-distance').innerText = "0.00";
    document.getElementById('display-time').innerText = "00:00";
    document.getElementById('display-speed').innerText = "0.0";
    document.getElementById('display-pace').innerText = "0:00";
  }

  // --- GYM LOGIC ---
  function adjustValue(id, delta) {
    const input = document.getElementById(id);
    let val = parseFloat(input.value) || 0;
    val = Math.max(0, val + delta);
    input.value = val;
  }

  function addGymSet() {
    const ex = document.getElementById('gym-exercise').value;
    const wt = document.getElementById('gym-weight').value;
    const rp = document.getElementById('gym-reps').value;

    if (!ex || !wt || !rp) return;

    const setData = { exercise: ex, weight: wt, reps: rp };
    currentGymSession.push(setData);
    
    renderCurrentGymSession();
    document.getElementById('btn-finish-gym').style.display = 'block';
  }

  function renderCurrentGymSession() {
    const list = document.getElementById('gym-session-list');
    list.innerHTML = currentGymSession.map((s, idx) => `
      <li class="exercise-item">
        <div class="exercise-info">
          <h4>${s.exercise}</h4>
          <p>${s.weight}kg × ${s.reps} reps</p>
        </div>
        <button onclick="removeSet(${idx})" style="background:none; border:none; color:#e74c3c; font-weight:bold;">✕</button>
      </li>
    `).join('');
  }

  function removeSet(idx) {
    currentGymSession.splice(idx, 1);
    renderCurrentGymSession();
    if (currentGymSession.length === 0) {
      document.getElementById('btn-finish-gym').style.display = 'none';
    }
  }

  function finishGymSession() {
    if (currentGymSession.length === 0) return;
    
    saveActivity({
      type: 'gym',
      date: new Date().toISOString(),
      sets: [...currentGymSession]
    });

    currentGymSession = [];
    renderCurrentGymSession();
    document.getElementById('btn-finish-gym').style.display = 'none';
    showView('history');
  }

  // --- DATA PERSISTENCE ---
  function saveActivity(activity) {
    const history = JSON.parse(localStorage.getItem('exercise-history') || '[]');
    history.unshift(activity);
    localStorage.setItem('exercise-history', JSON.stringify(history.slice(0, 50)));
  }

  function renderHistory() {
    const history = JSON.parse(localStorage.getItem('exercise-history') || '[]');
    const list = document.getElementById('history-list');
    
    if (history.length === 0) {
      list.innerHTML = '<p style="text-align:center; color:#95a5a6; padding: 20px;">No activities yet. Let\'s move!</p>';
      return;
    }

    list.innerHTML = history.map(h => {
      const date = new Date(h.date).toLocaleDateString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      if (h.type === 'gym') {
        const setSummary = h.sets.reduce((acc, s) => {
          acc[s.exercise] = (acc[s.exercise] || 0) + 1;
          return acc;
        }, {});
        const summaryStr = Object.entries(setSummary).map(([name, count]) => `${count}× ${name}`).join(', ');
        return `
          <div class="history-card">
            <span class="badge badge-gym">Gym</span>
            <div style="font-size: 0.75em; color: #bdc3c7; float: right;">${date}</div>
            <div style="font-size: 0.9em; font-weight: 600; margin-top: 5px;">${summaryStr}</div>
          </div>
        `;
      } else {
        const badgeClass = h.type === 'run' ? 'badge-run' : (h.type === 'bike' ? 'badge-bike' : 'badge-walk');
        return `
          <div class="history-card" style="border-left-color: ${h.type === 'run' ? '#27ae60' : (h.type === 'bike' ? '#2980b9' : '#f39c12')};">
            <span class="badge ${badgeClass}">${h.type}</span>
            <div style="font-size: 0.75em; color: #bdc3c7; float: right;">${date}</div>
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 8px;">
              <div>
                <span style="font-size: 1.2em; font-weight: 700;">${h.distance}</span> <span style="font-size: 0.8em; color:#7f8c8d;">km</span>
              </div>
              <div style="text-align: right; font-size: 0.85em;">
                <div>${formatTime(h.duration)}</div>
                <div style="color: #7f8c8d; font-size: 0.8em;">${h.avgSpeed} km/h</div>
              </div>
            </div>
          </div>
        `;
      }
    }).join('');
  }

  function clearHistory() {
    if (confirm("Clear all exercise data? This cannot be undone.")) {
      localStorage.removeItem('exercise-history');
      renderHistory();
    }
  }

  // --- SW / PWA ---
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('../sw.js');
  }
</script>
</body>
</html>
