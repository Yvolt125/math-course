                'Larger than 1 — it stretched space'

            answer: 2,
            explanation: 'det = 0 is the critical case. The transformation permanently destroyed a dimension — squashing 2D space to a line. The information is gone and cannot be recovered → no inverse exists.'

            type: 'calc',
