  <title>Lesson: JSON &amp; Config Files</title>

<body>
<script>
window.LESSON_DATA = {
  id: 'os_u3s3',
  title: 'JSON & Config Files',
  subtitle: 'json.load · json.dump · Config Patterns',
  color: '#8e44ad',
  questions: [
    {
      type: 'mc',
      prompt: 'What is JSON typically used for in data scripts?',
      options: [
        'Storing binary data like images',
        'Storing structured data (configs, API responses, nested records) as human-readable text',
        'Compressing large datasets',
        'Encrypting sensitive information'
      ],
      answer: 1,
      explanation: 'JSON (JavaScript Object Notation) is a lightweight text format for structured data. In Python scripts it is used for config files, saving API responses, exchanging data between services, and storing nested structures that CSV cannot represent.'
    },
    {
      type: 'fill',
      before: 'To parse a JSON file into a Python dictionary, use json.',
      after: '(f).',
      answer: 'load',
      explanation: 'json.load(f) reads from an open file object and returns a Python object (dict, list, str, int, float, bool, or None). For a JSON string (not a file), use json.loads(string) — the s stands for "string".'
    },
    {
      type: 'mc',
      prompt: 'What is the difference between json.load() and json.loads()?',
      options: [
        'json.load() is faster',
        'json.load() reads from a file object; json.loads() parses a string',
        'json.loads() reads from a file; json.load() parses a string',
        'They are identical'
      ],
      answer: 1,
      explanation: 'json.load(f) — "load from file". json.loads(s) — "load from string". Remember: the s in loads means string. Similarly json.dump(obj, f) writes to a file; json.dumps(obj) returns a string.'
    },
    {
      type: 'tf',
      prompt: 'json.dump() with indent=4 produces human-readable (pretty-printed) JSON output.',
      answer: true,
      explanation: 'json.dump(data, f, indent=4) writes nicely indented JSON. Without indent= you get a compact single-line string. indent=4 is the most common convention; indent=2 is used in many web APIs.'
    },
    {
      type: 'mc',
      prompt: 'You have config = {"api_key": "abc123", "timeout": 30}. How do you save it to config.json?',
      options: [
        'config.save("config.json")',
        'with open("config.json","w") as f: json.dump(config, f, indent=4)',
        'json.write(config, "config.json")',
        'open("config.json").write(json(config))'
      ],
      answer: 1,
      explanation: 'Open the file in write mode, then call json.dump(obj, file_object). The file must be open when you call dump — you cannot pass a filename directly to json.dump().'
    },
    {
      type: 'fill',
      before: 'JSON keys must be ',
      after: 's — Python integer keys are converted automatically.',
      answer: 'string',
      explanation: 'The JSON spec requires string keys. json.dumps({1: "a"}) converts the integer key to the string "1". When you load it back, the key will be the string "1", not the integer 1 — a common source of bugs.'
    },
    {
      type: 'mc',
      prompt: 'Which Python types can json.dumps() handle natively?',
      options: [
        'dict, list, str, int, float, bool, None',
        'dict, list, str, int, float, bool, None, datetime, set',
        'Only str and dict',
        'All Python types automatically'
      ],
      answer: 0,
      explanation: 'json handles: dict, list, str, int, float, bool, and None. It does NOT handle datetime, set, bytes, or custom objects — you get a TypeError. For datetime, convert to .isoformat() string first.'
    },
    {
      type: 'tf',
      prompt: 'Storing secrets like API keys in a JSON config file committed to git is a security best practice.',
      answer: false,
      explanation: 'Never commit secrets to git! Use environment variables or a .env file (added to .gitignore) for secrets. A JSON config file is fine for non-sensitive settings like timeouts, file paths, and feature flags.'
    },
    {
      type: 'mc',
      prompt: 'What is the .env pattern for config management?',
      options: [
        'Store all configuration in a .env Python file imported at startup',
        'Store key=value pairs in a .env file, load with python-dotenv, never commit to git',
        'Use environment variables only on Linux, .env only on Windows',
        'The .env file replaces the JSON config file entirely'
      ],
      answer: 1,
      explanation: 'A .env file holds KEY=VALUE pairs (e.g. API_KEY=abc123). python-dotenv\'s load_dotenv() reads it and injects into os.environ. Add .env to .gitignore so secrets stay off git. JSON configs handle non-secret settings; .env handles secrets.'
    },
    {
      type: 'mc',
      prompt: 'How do you load a JSON config and fall back to defaults for missing keys?',
      options: [
        'config = json.load(f) or defaults',
        'config = {**defaults, **json.load(f)}',
        'config = json.load(f, defaults=defaults)',
        'if key not in config: config = defaults[key]'
      ],
      answer: 1,
      explanation: '{**defaults, **loaded} merges two dicts: start with all defaults, then overwrite with whatever was in the loaded config. Keys in loaded take priority; missing keys fall back to defaults. This is the canonical Python config merging pattern.'
    }
  ]
};
</script>
