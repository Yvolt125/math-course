<script>
window.LESSON_DATA = {
    id: 'w2s5',
    title: 'Symmetric Matrices & Diagonalization',
    subtitle: 'Spectral theorem · PD/PSD · Eigendecomposition',
    color: '#2980b9',
    questions: [
        {
            type: 'mc',
            prompt: 'A symmetric matrix S satisfies…',
            options: ['S = S⁻¹', 'S = Sᵀ', 'det(S) = 1', 'S has all zero off-diagonal entries'],
            answer: 1,
            explanation: 'A symmetric matrix equals its own transpose: S = Sᵀ. This means the entry at row i, column j equals the entry at row j, column i. Covariance matrices and X^TX are always symmetric.'
        },
        {
            type: 'mc',
            prompt: 'The Spectral Theorem guarantees that for symmetric matrices…',
            options: [
                'All eigenvalues are complex',
                'Eigenvectors may be linearly dependent',
                'All eigenvalues are real and eigenvectors are mutually orthogonal',
                'The matrix is always positive definite'
            ],
            answer: 2,
            explanation: 'The Spectral Theorem: symmetric matrices always have real eigenvalues and orthogonal eigenvectors. This makes symmetric matrices the "cleanest" case — no complex numbers, always a clean geometric decomposition.'
        },
        {
            type: 'fill',
            before: 'Diagonalization: A = P D ',
            after: '¹, where D is diagonal (eigenvalues) and P contains eigenvectors.',
            answer: 'P⁻',
            explanation: 'A = PDP⁻¹ means you can change to the eigenvector basis (P⁻¹), scale by eigenvalues (D), then change back (P). For symmetric matrices this simplifies to A = QDQᵀ where Q is orthogonal (Q⁻¹ = Qᵀ).'
        },
        {
            type: 'tf',
            prompt: 'A positive definite matrix has all positive eigenvalues.',
            answer: true,
            explanation: 'Positive definite (PD): vᵀSv > 0 for all v ≠ 0 ↔ all eigenvalues > 0. Positive semi-definite (PSD): vᵀSv ≥ 0 ↔ all eigenvalues ≥ 0. Covariance matrices are always PSD.'
        },
        {
            type: 'mc',
            prompt: 'Why are covariance matrices always positive semi-definite (PSD)?',
            options: [
                'Because they are computed from real data',
                'Because vᵀΣv = variance of the projection of data onto v, which is always ≥ 0',
                'Because their trace equals zero',
                'Because they are square and symmetric'
            ],
            answer: 1,
            explanation: 'vᵀΣv = variance of the data projected onto direction v — variance is always non-negative. This is why covariance matrices can never have negative eigenvalues (PSD). If the data has full rank, it\'s strictly PD (all λ > 0).'
        },
        {
            type: 'type',
            prompt: 'For a symmetric matrix S = QDQᵀ, the columns of Q are the ___ and the diagonal entries of D are the ___.',
            answer: ['eigenvectors', 'eigenvalues'],
            explanation: 'The eigendecomposition S = QDQᵀ: Q is the orthogonal matrix of eigenvectors (columns = principal directions), D is diagonal with eigenvalues (the scale factors in each direction).'
        },
        {
            type: 'tf',
            prompt: 'A symmetric matrix with a zero eigenvalue is singular.',
            answer: true,
            explanation: 'det(A) = product of all eigenvalues. One zero eigenvalue → det = 0 → singular. For covariance matrices, a zero eigenvalue means the data is perfectly collinear in that direction — a redundant feature.'
        }
    ]
};
</script>
