    <title>Lesson: Gradient Descent</title>

<script>
window.LESSON_DATA = {
    id: 'w3s2',
    title: 'Gradient Descent',
    subtitle: 'Optimisation · Learning rate · Convergence',
    color: '#e67e22',
    questions: [
        {
            type: 'mc',
            prompt: 'The goal of gradient descent is to…',
            options: [
                'Maximise the loss function',
                'Find the weight values that minimise the loss function',
                'Compute the gradient of the input data',
                'Increase the learning rate until convergence'
            ],
            answer: 1,
            explanation: 'Gradient descent iteratively adjusts weights to minimise the loss L(w). By always stepping in the direction opposite to the gradient (downhill), we find a (local) minimum.'
        },
        {
            type: 'fill',
            before: 'The gradient descent update rule is: w ← w − ',
            after: ' · ∂L/∂w',
            answer: 'α',
            explanation: 'α (alpha) is the learning rate — a small positive scalar controlling step size. The gradient ∂L/∂w tells us which direction is uphill; we subtract it to go downhill.'
        },
        {
            type: 'tf',
            prompt: 'A very large learning rate α guarantees that gradient descent converges faster.',
            answer: false,
            explanation: 'Too large an α causes the update to overshoot the minimum — the loss may increase or oscillate wildly. Good learning rate selection is critical: typical values are 0.01, 0.001, or found via a schedule.'
        },
        {
            type: 'calc',
            prompt: 'L(w) = w². w = 4, α = 0.1. After one gradient descent step, what is the new w?',
            answer: 3.2,
            hint: 'dL/dw = 2w. New w = w − α·(2w)',
            explanation: 'dL/dw = 2w = 8. New w = 4 − 0.1 × 8 = 4 − 0.8 = 3.2. Each step reduces w, moving toward the minimum at w=0.'
        },
        {
            type: 'mc',
            prompt: 'If ∂L/∂w > 0, gradient descent will move w in which direction?',
            options: [
                'Increase w (move right)',
                'Decrease w (move left)',
                'w stays unchanged',
                'w is set to zero'
            ],
            answer: 1,
            explanation: 'w ← w − α·(positive number) → w decreases. When the gradient is positive, the loss is rising as w increases, so we should decrease w to go toward the minimum.'
        },
        {
            type: 'type',
            prompt: 'The parameter α that controls the step size in gradient descent is called the ___ rate.',
            answer: 'learning',
            explanation: 'The learning rate α is one of the most important hyperparameters. It controls how big each update step is. Too small: slow training. Too large: instability. Common values: 0.1, 0.01, 0.001.'
        },
        {
            type: 'tf',
            prompt: 'Stochastic Gradient Descent (SGD) uses ALL training examples to compute each gradient update.',
            answer: false,
            explanation: 'SGD uses ONE random sample per update (or sometimes a small mini-batch). Full-batch GD uses all data — it\'s more stable but much slower. SGD is noisier but faster per step and can escape shallow local minima.'
        },
        {
            type: 'calc',
            prompt: 'w = 6, α = 0.2, ∂L/∂w = 5. What is w after one gradient descent step?',
            answer: 5,
            hint: 'w_new = w − α · gradient',
            explanation: 'w_new = 6 − 0.2 × 5 = 6 − 1.0 = 5. This is one step of gradient descent: subtract a fraction of the gradient from the current weight.'
        },
        {
            type: 'mc',
            prompt: 'Gradient descent has converged when…',
            options: [
                'The loss reaches zero',
                'The gradient is approximately zero (we are at or near a minimum)',
                'The learning rate reaches zero',
                'The weight w stops changing due to overflow'
            ],
            answer: 1,
            explanation: 'At a minimum, ∂L/∂w ≈ 0, so updates become negligible: w ← w − α·0 ≈ w. In practice, we stop when |gradient| < ε or when the loss stops improving significantly.'
        },
        {
            type: 'mc',
            prompt: 'What is the main advantage of mini-batch gradient descent over full-batch GD?',
            options: [
                'More accurate gradients',
                'Faster per step and can leverage GPU parallelism while being more stable than SGD',
                'Guaranteed to find the global minimum',
                'Doesn\'t require a learning rate'
            ],
            answer: 1,
            explanation: 'Mini-batch GD (batch size 32–512) averages gradients over a small batch: more stable than SGD, faster than full-batch. It also fits naturally on GPUs which process batches in parallel — the standard in deep learning.'
        },
        {
            type: 'fill',
            before: 'At a minimum of the loss function, the gradient is equal to ',
            after: '.',
            answer: ['zero', '0'],
            explanation: 'A minimum requires ∂L/∂w = 0 (flat tangent). This is why gradient descent converges — updates shrink as the gradient approaches zero near the minimum.'
        },
        {
            type: 'tf',
            prompt: 'Gradient descent always finds the global minimum of the loss function.',
            answer: false,
            explanation: 'GD finds a local minimum, which may or may not be global. For convex losses (like MSE in linear regression), local = global. For non-convex losses (deep neural nets), multiple local minima exist. In practice, good local minima are often sufficient.'
        }
    ]
};
</script>
