    <title>Lesson: The Chain Rule</title>

<script>
window.LESSON_DATA = {
    id: 'w3s4',
    title: 'The Chain Rule',
    subtitle: 'Composite functions · Backpropagation',
    color: '#8e44ad',
    questions: [
        {
            type: 'fill',
            before: 'Chain rule: d/dx[f(g(x))] = f\'(g(x)) · ',
            after: '',
            answer: 'g\'(x)',
            explanation: '"Derivative of the outer applied to the inner, times derivative of the inner." This is the single most important rule for deep learning — backpropagation is the chain rule applied across many layers.'
        },
        {
            type: 'mc',
            prompt: 'd/dx[e^(3x)] = ?',
            options: ['e^(3x)', '3e^(3x)', '3xe^(3x)', 'e^(3x) + 3'],
            answer: 1,
            explanation: 'Outer: eᵘ → eᵘ. Inner: u = 3x → 3. Chain rule: eᵘ · 3 = 3e^(3x). The outer derivative preserves eᵘ, and we multiply by the inner derivative 3.'
        },
        {
            type: 'tf',
            prompt: 'Backpropagation in neural networks is a direct application of the chain rule.',
            answer: true,
            explanation: 'Backpropagation computes ∂L/∂wᵢ for every weight by chaining partial derivatives layer-by-layer from the output back to the input. It is literally the chain rule applied to a computational graph.'
        },
        {
            type: 'calc',
            prompt: 'd/dx[(2x + 1)³] at x = 0 = ?',
            answer: 6,
            hint: 'Outer: uᵌ → 3u². Inner: 2x+1 → 2. At x=0: u=(2·0+1)=1.',
            explanation: 'f\'(x) = 3(2x+1)² · 2 = 6(2x+1)². At x=0: 6 · 1² = 6. The chain rule multiplies the outer and inner derivatives.'
        },
        {
            type: 'mc',
            prompt: 'd/dx[e^(x²)] = ?',
            options: ['e^(x²)', 'x·e^(x²)', '2x·e^(x²)', '2·e^(x²)'],
            answer: 2,
            explanation: 'Outer: eᵘ → eᵘ. Inner: x² → 2x. Chain: eᵘ · 2x = 2x·e^(x²). This pattern appears in Gaussian probability density functions, which underlie many ML loss functions.'
        },
        {
            type: 'type',
            prompt: 'The chain rule allows us to differentiate ___ functions (functions built from functions).',
            answer: 'composite',
            explanation: 'A composite function f(g(x)) plugs one function into another. Neural networks are extremely deep compositions: the output is σ(W₃·σ(W₂·σ(W₁·x))). The chain rule unravels all of these compositions.'
        },
        {
            type: 'mc',
            prompt: 'd/dx[ln(x²)] = ?',
            options: ['1/x²', '2/x', '2x/ln(x)', '1/(2x)'],
            answer: 1,
            explanation: 'Outer: ln(u) → 1/u. Inner: x² → 2x. Chain: (1/x²) · 2x = 2/x. Alternatively: ln(x²) = 2·ln(x), so d/dx = 2/x directly. Both approaches give the same answer.'
        },
        {
            type: 'calc',
            prompt: 'Sigmoid: σ(z) = 1/(1+e⁻ᶻ). At z=0: σ(0) = 0.5. σ\'(0) = σ(0)(1−σ(0)) = ?',
            answer: 0.25,
            hint: 'σ\'(z) = σ(z)(1 − σ(z)). At z=0: σ(0)=0.5',
            explanation: 'σ\'(0) = 0.5 × (1 − 0.5) = 0.5 × 0.5 = 0.25. The maximum slope of sigmoid is 0.25 at z=0. For |z| large, σ\'(z) → 0 — the vanishing gradient problem in deep networks with sigmoid activation.'
        },
        {
            type: 'tf',
            prompt: 'For y = f(g(h(x))), applying the chain rule requires two multiplications.',
            answer: true,
            explanation: 'dy/dx = f\'(g(h(x))) · g\'(h(x)) · h\'(x). Three functions nested → two chain rule applications. For an L-layer network, there are L−1 multiplications — this is why gradients can vanish (product of many small numbers).'
        },
        {
            type: 'mc',
            prompt: 'd/dx[sin(x²)] = ?',
            options: ['cos(x²)', '2x·cos(x²)', 'sin(2x)', '2x·cos(x)'],
            answer: 1,
            explanation: 'Outer: sin(u) → cos(u). Inner: x² → 2x. Chain: cos(x²) · 2x = 2x·cos(x²). The chain rule is mechanical: identify inner and outer, differentiate each, multiply.'
        },
        {
            type: 'mc',
            prompt: 'In a neural network, the chain rule is applied during…',
            options: [
                'The forward pass — computing predictions',
                'The backward pass (backpropagation) — computing gradients',
                'Data preprocessing',
                'Weight initialisation'
            ],
            answer: 1,
            explanation: 'The forward pass computes predictions layer by layer. The backward pass (backpropagation) applies the chain rule in reverse to compute ∂L/∂wᵢ for every weight. The forward pass must happen first to compute the values needed in the chain.'
        },
        {
            type: 'calc',
            prompt: 'd/dx[(3x)²] = 2(3x)·3. At x=2, this equals ?',
            answer: 36,
            hint: 'f\'(x) = 18x. At x=2: 18×2',
            explanation: 'd/dx[(3x)²] = 2(3x)·3 = 18x. At x=2: 18×2 = 36. Alternatively: (3x)² = 9x², so d/dx = 18x. Both give 36 at x=2.'
        }
    ]
};
</script>
