    <title>Lesson: Data &amp; Geometry</title>

<script>
window.LESSON_DATA = {
    id: 'w1s1',
    title: 'Data & Geometry',
    subtitle: 'Scalars · Vectors · Matrices',
    color: '#2980b9',
    questions: [
        {
            type: 'tf',
            prompt: 'A scalar has both magnitude and direction.',
            answer: false,
            explanation: 'A scalar is just a single number — magnitude only, no direction. Examples: 22, −3.7, π. A vector is what has both magnitude and direction.'
        },
        {
            type: 'mc',
            prompt: 'Which best describes a vector?',
            options: [
                'A single number on a number line',
                'A grid of all data points',
                'An ordered list of numbers representing a point in multi-dimensional space',
                'The sum of two scalars'
            ],
            answer: 2,
            explanation: 'A vector is an ordered list of numbers — e.g. [1800, 4, 2] for a house. It locates a point in multi-dimensional space and can be drawn as an arrow from the origin.'
        },
        {
            type: 'calc',
            prompt: 'Vector v = [3, 4]. What is its magnitude ‖v‖?',
            answer: 5,
            hint: '‖v‖ = √(3² + 4²)',
            explanation: '‖v‖ = √(9 + 16) = √25 = 5. This is the classic 3-4-5 Pythagorean triple. Magnitude is the Euclidean distance from the origin to the tip of the vector.'
        },
        {
            type: 'mc',
            prompt: 'A dataset with 200 houses and 6 features (sqft, bedrooms, bathrooms, age, garage, price) is stored as a matrix of shape…',
            options: ['6 × 200', '200 × 6', '1 × 1200', '6 × 6'],
            answer: 1,
            explanation: 'Convention: rows = observations, columns = features. 200 houses × 6 features = a 200 × 6 matrix.'
        },
        {
            type: 'calc',
            prompt: 'Dot product of u = [2, 3] and v = [4, 1] = ?',
            answer: 11,
            hint: 'u · v = u₁v₁ + u₂v₂',
            explanation: 'u · v = (2×4) + (3×1) = 8 + 3 = 11. The dot product sums element-wise products. It measures the alignment between two vectors.'
        },
        {
            type: 'tf',
            prompt: 'A vector [1800, 4, 2] representing a house (sqft, bedrooms, bathrooms) lives in 3-dimensional space.',
            answer: true,
            explanation: 'Three components → three dimensions. Each component is a coordinate along one axis. This is why we say the data "lives in space".'
        },
        {
            type: 'mc',
            prompt: 'Transposing a matrix of shape 3 × 5 produces a matrix of shape…',
            options: ['3 × 5', '5 × 3', '15 × 1', '5 × 5'],
            answer: 1,
            explanation: 'Transpose flips rows and columns: (m × n)ᵀ becomes (n × m). A 3 × 5 matrix becomes 5 × 3. If X stores data as (samples × features), Xᵀ is (features × samples).'
        },
        {
            type: 'fill',
            before: 'A matrix stacks individual data point ',
            after: 's as rows — one per observation.',
            answer: 'vector',
            explanation: 'Each row of a matrix is one data point\'s feature vector. The matrix is your entire dataset at once — a compact representation for computation.'
        },
        {
            type: 'tf',
            prompt: 'Two vectors are orthogonal (perpendicular) if and only if their dot product equals zero.',
            answer: true,
            explanation: 'u · v = ‖u‖ ‖v‖ cos θ. When θ = 90°, cos 90° = 0, so u · v = 0. Zero dot product ↔ orthogonal. This is fundamental in PCA and least squares projections.'
        },
        {
            type: 'visual',
            visual: '<svg width="200" height="155" viewBox="0 0 200 155" xmlns="http://www.w3.org/2000/svg" style="background:#f8fafc;border-radius:10px;border:1.5px solid #e1e8ed"><line x1="100" y1="10" x2="100" y2="145" stroke="#e1e8ed" stroke-width="1"/><line x1="10" y1="80" x2="190" y2="80" stroke="#e1e8ed" stroke-width="1"/><text x="103" y="93" font-size="10" fill="#7f8c8d" font-family="sans-serif">O</text><line x1="100" y1="80" x2="170" y2="80" stroke="#2980b9" stroke-width="2.5" stroke-linecap="round"/><polygon points="170,80 161,75 161,85" fill="#2980b9"/><text x="128" y="72" font-size="12" fill="#2980b9" font-family="sans-serif" font-weight="bold">v=[2,0]</text><line x1="100" y1="80" x2="160" y2="20" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/><polygon points="160,20 150,29 160,32" fill="#e74c3c"/><text x="162" y="50" font-size="12" fill="#e74c3c" font-family="sans-serif" font-weight="bold">u=[2,2]</text></svg>',
            type: 'mc',
            prompt: 'The diagram shows v = [2, 0] (blue) and u = [2, 2] (red). Which vector has a larger magnitude?',
            options: [
                'v — it is horizontal so it is longer',
                'u — it has components in both x and y directions',
                'They are equal — both have x-component 2',
                'Cannot tell from the diagram'
            ],
            answer: 1,
            explanation: '‖v‖ = √(4+0) = 2. ‖u‖ = √(4+4) = √8 ≈ 2.83. u is longer even though they share the same x-component, because u also has a y-component adding to its length.'
        },
        {
            type: 'fill',
            before: 'The L2 norm (magnitude) of vector v = [v₁, v₂, …, vₙ] is: ‖v‖ = √( sum of each element ',
            after: ' )',
            answer: 'squared',
            explanation: '‖v‖ = √(v₁² + v₂² + … + vₙ²). Square each component, sum them, then take the square root. This is the Euclidean distance from the origin to point v.'
        },
        {
            type: 'mc',
            prompt: 'In ML, what does each row of a data matrix X typically represent?',
            options: ['One feature', 'One weight', 'One data point / observation', 'One prediction'],
            answer: 2,
            explanation: 'Rows = observations (e.g. individual houses). Columns = features (e.g. sqft, bedrooms). This is the universal ML convention and determines how all matrix operations work.'
        },
        {
            type: 'calc',
            prompt: 'If vector a = [0, 5], what is ‖a‖?',
            answer: 5,
            hint: '‖a‖ = √(0² + 5²)',
            explanation: '‖a‖ = √(0 + 25) = √25 = 5. A vector pointing purely along one axis has magnitude equal to its single non-zero component.'
        }
    ]
};
</script>
