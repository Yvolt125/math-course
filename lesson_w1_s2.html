<script>
window.LESSON_DATA = {
    id: 'w1s2',
    title: 'Linear Equations',
    subtitle: 'Weights · Bias · Geometry',
    color: '#8e44ad',
    questions: [
        {
            type: 'fill',
            before: 'The general linear equation is: y = w₁x₁ + w₂x₂ + ',
            after: '',
            answer: 'b',
            explanation: 'b is the bias (y-intercept). It shifts the line away from the origin so the model can fit real data that doesn\'t start at zero.'
        },
        {
            type: 'mc',
            prompt: 'In y = wx + b, what does the term \'b\' represent?',
            options: ['A weight', 'A feature value', 'The bias — the y-intercept', 'The prediction output'],
            answer: 2,
            explanation: 'b is the bias term. Without it, the line would be forced through the origin. Bias lets the model account for a baseline value (e.g. a house with 0 sqft isn\'t worth £0).'
        },
        {
            type: 'calc',
            prompt: 'y = 2x₁ + 3x₂ − 1. With x₁ = 2, x₂ = 1, calculate y.',
            answer: 6,
            hint: 'Substitute directly: y = 2(2) + 3(1) − 1',
            explanation: 'y = 2×2 + 3×1 − 1 = 4 + 3 − 1 = 6. This is just substituting feature values into the linear equation. The weights multiply the features, and bias is added at the end.'
        },
        {
            type: 'tf',
            prompt: 'A linear equation in 2D graphs as a straight line.',
            answer: true,
            explanation: 'Exactly — "linear" means straight. The equation uses only addition and scaling (no x², no curves), which always produces a straight line in 2D.'
        },
        {
            type: 'visual',
            visual: '<svg width="200" height="155" viewBox="0 0 200 155" xmlns="http://www.w3.org/2000/svg" style="background:#f8fafc;border-radius:10px;border:1.5px solid #e1e8ed"><line x1="100" y1="10" x2="100" y2="145" stroke="#e1e8ed" stroke-width="1"/><line x1="10" y1="80" x2="190" y2="80" stroke="#e1e8ed" stroke-width="1"/><text x="102" y="13" font-size="10" fill="#7f8c8d" font-family="sans-serif">y</text><text x="183" y="78" font-size="10" fill="#7f8c8d" font-family="sans-serif">x</text><line x1="15" y1="135" x2="185" y2="15" stroke="#8e44ad" stroke-width="2.5" stroke-linecap="round"/><circle cx="100" cy="75" r="3" fill="#e74c3c"/><text x="105" y="72" font-size="10" fill="#e74c3c" font-family="sans-serif">y-int</text><text x="108" y="25" font-size="11" fill="#8e44ad" font-family="sans-serif" font-weight="bold">y=2x+1</text></svg>',
            type: 'mc',
            prompt: 'The line y = 2x + 1 is graphed above. What does the red dot (y-intercept) represent?',
            options: [
                'The slope of the line',
                'The value of y when x = 0 — the bias term b = 1',
                'The value of x when y = 0',
                'The weight w₁ = 2'
            ],
            answer: 1,
            explanation: 'The y-intercept is where the line crosses the y-axis — when x = 0. Here y = 2(0) + 1 = 1. This is the bias term b. The slope (weight) w = 2 controls the steepness.'
        },
        {
            type: 'mc',
            prompt: 'In ML, what do the weights w₁, w₂, … represent?',
            options: [
                'The number of features in the dataset',
                'The importance / contribution of each feature to the prediction',
                'The bias term',
                'The output of the model'
            ],
            answer: 1,
            explanation: 'Weights quantify how much each feature influences the prediction. A large weight means that feature has a strong effect. Finding the best weights is precisely what ML training does.'
        },
        {
            type: 'calc',
            prompt: 'w = [1, −2], x = [5, 3], b = 4. Calculate y = w · x + b.',
            answer: 3,
            hint: 'w · x = (1)(5) + (−2)(3), then add b',
            explanation: 'w · x = 5 + (−6) = −1. y = −1 + 4 = 3. Negative weights reduce the prediction when the corresponding feature is large. Bias shifts the baseline.'
        },
        {
            type: 'mc',
            prompt: 'A linear equation with three variables (x₁, x₂, x₃) represents what geometric object in 3D space?',
            options: ['A curve', 'A sphere', 'A point', 'A flat plane'],
            answer: 3,
            explanation: 'In 3D, one linear equation defines a flat plane — an infinite flat sheet cutting through space. The solution to a system of 3 equations is where those planes intersect.'
        },
        {
            type: 'tf',
            prompt: 'The bias term forces the linear model to always pass through the origin (0, 0).',
            answer: false,
            explanation: 'False — the bias does the opposite. Without b, the line must pass through the origin. The bias "lifts" or "lowers" the line to fit data with a natural baseline.'
        },
        {
            type: 'mc',
            prompt: 'If weight w₁ is negative (e.g. w₁ = −3), increasing feature x₁ will…',
            options: [
                'Increase y proportionally',
                'Decrease y — a negative weight reverses the effect of its feature',
                'Have no effect on y',
                'Flip the sign of the bias'
            ],
            answer: 1,
            explanation: 'y = w₁x₁ + … When w₁ < 0, larger x₁ makes w₁x₁ more negative → y decreases. Example: high crime rate (x₁) with negative weight → lower house price (y).'
        },
        {
            type: 'fill',
            before: 'In vector notation, the linear equation is: y = w',
            after: 'x + b, where ᵀ means transpose.',
            answer: ['ᵀ', 'T', '^T'],
            explanation: 'wᵀx is the dot product of w and x written compactly. Since w and x are both column vectors, we transpose w to make it a row vector so the multiplication gives a scalar output.'
        },
        {
            type: 'type',
            prompt: 'An equation that uses only addition and scaling — no powers or curves — is called a ___ equation.',
            answer: 'linear',
            explanation: '"Linear" comes from the Latin for line. Using only addition and multiplication by constants guarantees the result is always geometrically flat (a line, plane, or hyperplane).'
        },
        {
            type: 'calc',
            prompt: 'w₁ = 3, w₂ = −1, x₁ = 4, x₂ = 6, b = 2. Calculate y = w₁x₁ + w₂x₂ + b.',
            answer: 8,
            hint: 'y = 3(4) + (−1)(6) + 2',
            explanation: 'y = 12 − 6 + 2 = 8. Each weight multiplies its corresponding feature. Positive weights push y up, negative weights pull it down. Bias adds a constant offset.'
        }
    ]
};
</script>
