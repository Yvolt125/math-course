<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAT Practice — Study Hub</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0d1b26">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="../icon.svg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0d1b26; height: 100vh; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        /* Header */
        .test-header { background: #0d1b26; color: white; height: 48px; display: flex; align-items: center; padding: 0 16px; gap: 14px; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .back-btn { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.8em; white-space: nowrap; }
        .back-btn:hover { color: white; }
        .sep { color: rgba(255,255,255,0.2); }
        .test-logo { font-size: 0.75em; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.85); }
        .section-label { flex: 1; text-align: center; font-size: 0.8em; color: rgba(255,255,255,0.6); letter-spacing: 1px; }
        .timer { font-family: 'Courier New', monospace; font-size: 0.9em; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 5px; color: white; cursor: pointer; min-width: 64px; text-align: center; user-select: none; }
        .timer.paused { opacity: 0.45; }
        .timer-label { font-size: 0.72em; color: rgba(255,255,255,0.45); margin-right: 2px; }

        /* Filter bar */
        .filter-bar { background: #f8f9fa; border-bottom: 1px solid #dde3ea; padding: 8px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; }
        .fgroup { display: flex; align-items: center; gap: 6px; }
        .flabel { font-size: 0.75em; color: #7f8c8d; font-weight: 600; white-space: nowrap; }
        .fsel { border: 1px solid #d5d8dc; border-radius: 6px; padding: 5px 8px; font-size: 0.8em; color: #2c3e50; background: white; cursor: pointer; }
        .diff-btns { display: flex; gap: 4px; margin-left: auto; }
        .diff-btn { padding: 5px 10px; border-radius: 5px; border: 1px solid #d5d8dc; font-size: 0.75em; font-weight: 600; cursor: pointer; background: white; color: #7f8c8d; }
        .diff-btn.active { background: #2c3e50; color: white; border-color: #2c3e50; }

        /* Body */
        .test-body { flex: 1; display: flex; overflow: hidden; }

        /* Navigator */
        .nav-panel { width: 172px; flex-shrink: 0; background: #f0f2f5; border-right: 1px solid #dde3ea; display: flex; flex-direction: column; }
        .nav-title { padding: 12px 14px 8px; font-size: 0.68em; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #7f8c8d; }
        .q-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 0 10px; overflow-y: auto; flex: 1; align-content: start; }
        .q-dot { aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.72em; font-weight: 700; cursor: pointer; border: 1.5px solid #d5d8dc; background: white; color: #95a5a6; }
        .q-dot.correct  { border-color: #27ae60; background: #27ae60; color: white; }
        .q-dot.wrong    { border-color: #e74c3c; background: #e74c3c; color: white; }
        .q-dot.flagged  { border-color: #f39c12; background: #fef9e7; color: #f39c12; }
        .q-dot.current  { outline: 2.5px solid #2c3e50; outline-offset: 2px; }
        .q-dot.current:not(.correct):not(.wrong):not(.flagged) { background: #2c3e50; border-color: #2c3e50; color: white; }
        .nav-legend { padding: 10px 14px; border-top: 1px solid #dde3ea; }
        .leg { display: flex; align-items: center; gap: 6px; font-size: 0.71em; color: #7f8c8d; margin-bottom: 4px; }
        .leg-dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

        /* Question area */
        .q-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; background: white; }

        /* RC split */
        .rc-split { display: flex; height: 100%; overflow: hidden; }
        .passage-col { width: 44%; border-right: 1px solid #e1e8ed; overflow-y: auto; padding: 24px 22px; background: #fafbfc; }
        .passage-title { font-size: 0.7em; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #7f8c8d; margin-bottom: 12px; }
        .passage-text { font-size: 0.875em; line-height: 1.9; color: #2c3e50; }
        .passage-text p { margin-bottom: 13px; }
        .q-col { flex: 1; overflow-y: auto; padding: 24px 26px; }

        /* Panels */
        .single-panel { padding: 30px 40px; max-width: 800px; margin: 0 auto; overflow-y: auto; height: 100%; width: 100%; }
        .ds-panel { padding: 26px 36px; max-width: 800px; margin: 0 auto; overflow-y: auto; height: 100%; width: 100%; }
        .ds-note { font-size: 0.78em; color: #7f8c8d; font-style: italic; margin-bottom: 14px; line-height: 1.6; background: #f8f9fa; border-radius: 6px; padding: 10px 14px; }
        .statements { background: #f8f9fa; border: 1px solid #e1e8ed; border-radius: 8px; padding: 14px 18px; margin: 12px 0 16px; }
        .stmt { font-size: 0.89em; color: #2c3e50; padding: 6px 0; line-height: 1.6; border-bottom: 1px solid #eaecee; }
        .stmt:last-child { border-bottom: none; }

        /* Question elements */
        .q-meta { font-size: 0.7em; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #aab7c4; margin-bottom: 10px; }
        .q-stem { font-size: 0.94em; color: #1a252f; line-height: 1.78; margin-bottom: 20px; }

        /* MCQ/DS choices */
        .choices { display: flex; flex-direction: column; gap: 8px; }
        .choice { display: flex; align-items: flex-start; gap: 12px; padding: 11px 14px; border-radius: 8px; border: 1.5px solid #e1e8ed; background: white; cursor: pointer; transition: border-color 0.1s, background 0.1s; }
        .choice:hover  { border-color: #aab7c4; background: #f8f9fa; }
        .choice.sel    { border-color: #2980b9; background: #eaf4fb; }
        .choice.right  { border-color: #27ae60 !important; background: #eafaf1 !important; }
        .choice.wrong  { border-color: #e74c3c !important; background: #fdf2f2 !important; }
        .oval { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #bdc3c7; display: flex; align-items: center; justify-content: center; font-size: 0.76em; font-weight: 700; color: #7f8c8d; flex-shrink: 0; margin-top: 2px; }
        .choice.sel   .oval { border-color: #2980b9; background: #2980b9; color: white; }
        .choice.right .oval { border-color: #27ae60; background: #27ae60; color: white; }
        .choice.wrong .oval { border-color: #e74c3c; background: #e74c3c; color: white; }
        .choice-text { font-size: 0.87em; color: #2c3e50; line-height: 1.55; padding-top: 3px; }

        /* Explanation */
        .explain-box { display: none; margin-top: 16px; background: #eaf4fb; border: 1.5px solid #aed6f1; border-radius: 8px; padding: 15px 18px; font-size: 0.85em; color: #1a5276; line-height: 1.7; }
        .explain-box.show { display: block; }
        .explain-label { font-weight: 700; font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }

        /* Context blocks */
        .ctx-passage { background: #f8f9fa; border-left: 4px solid #5d6d7e; border-radius: 0 8px 8px 0; padding: 16px 18px; margin-bottom: 18px; font-size: 0.87em; color: #444; line-height: 1.8; }
        .ctx-table-wrap { overflow-x: auto; margin-bottom: 18px; }
        .ctx-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        .ctx-table th { background: #f0f2f5; padding: 9px 12px; font-weight: 700; color: #5d6d7e; border: 1px solid #e1e8ed; text-align: left; }
        .ctx-table td { padding: 8px 12px; border: 1px solid #e1e8ed; color: #34495e; }
        .ctx-tabs { margin-bottom: 18px; border: 1px solid #e1e8ed; border-radius: 8px; overflow: hidden; }
        .ctx-tab-bar { display: flex; background: #f0f2f5; border-bottom: 1px solid #e1e8ed; }
        .ctx-tab { flex: 1; padding: 10px; border: none; background: transparent; font-size: 0.82em; font-weight: 600; color: #7f8c8d; cursor: pointer; border-bottom: 2px solid transparent; transition: color .2s; }
        .ctx-tab.active { color: #2c3e50; border-bottom-color: #2c3e50; background: white; }
        .ctx-tab-panel { display: none; padding: 14px 16px; font-size: 0.87em; color: #444; line-height: 1.7; }
        .ctx-tab-panel.active { display: block; }

        /* TPA */
        .tpa-table { width: 100%; border-collapse: collapse; margin-bottom: 18px; }
        .tpa-table th { background: #f0f2f5; padding: 9px 12px; font-size: 0.78em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #5d6d7e; border: 1px solid #e1e8ed; text-align: center; }
        .tpa-table th:last-child { text-align: left; }
        .tpa-cell { padding: 11px 14px; border: 1px solid #e1e8ed; text-align: center; cursor: pointer; min-width: 50px; transition: background .15s; font-size: 1em; color: #bdc3c7; }
        .tpa-cell:hover:not(.tpa-locked) { background: #f0f2f5; color: #2c3e50; }
        .tpa-cell.tpa-sel   { background: #d6eaf8; color: #2980b9; font-weight: 700; }
        .tpa-cell.tpa-right { background: #eafaf1 !important; color: #27ae60 !important; font-weight: 700; }
        .tpa-cell.tpa-wrong { background: #fdf2f2 !important; color: #e74c3c !important; font-weight: 700; }
        .tpa-cell.tpa-locked { cursor: default; }
        .tpa-label { padding: 11px 14px; border: 1px solid #e1e8ed; color: #2c3e50; font-size: 0.87em; }

        /* YN */
        .yn-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
        .yn-row { background: #f8f9fa; border: 1px solid #e1e8ed; border-radius: 8px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
        .yn-stmt { font-size: 0.87em; color: #2c3e50; flex: 1; line-height: 1.55; }
        .yn-btns { display: flex; gap: 8px; flex-shrink: 0; }
        .yn-btn { padding: 7px 18px; border: 1.5px solid #d5d8dc; border-radius: 6px; background: white; font-size: 0.83em; font-weight: 700; cursor: pointer; transition: all .2s; }
        .yn-btn:hover:not(:disabled) { border-color: #2980b9; color: #2980b9; }
        .yn-btn.yn-sel   { background: #2980b9; color: white; border-color: #2980b9; }
        .yn-btn.yn-right { background: #27ae60 !important; color: white !important; border-color: #27ae60 !important; }
        .yn-btn.yn-wrong { background: #e74c3c !important; color: white !important; border-color: #e74c3c !important; }

        /* Dropdown */
        .dd-text { font-size: 0.93em; color: #1a252f; line-height: 2.4; margin-bottom: 18px; }
        .dd-select { padding: 5px 8px; border: 1.5px solid #d5d8dc; border-radius: 6px; font-size: 0.87em; cursor: pointer; background: white; margin: 0 4px; transition: border-color .2s; }
        .dd-select:focus { outline: none; border-color: #2980b9; }
        .dd-select.dd-right { border-color: #27ae60; background: #eafaf1; }
        .dd-select.dd-wrong { border-color: #e74c3c; background: #fdf2f2; }

        /* Empty state */
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #aab7c4; text-align: center; padding: 40px; }
        .empty-icon  { font-size: 3em; margin-bottom: 16px; }
        .empty-title { font-size: 1em; font-weight: 600; color: #95a5a6; margin-bottom: 6px; }
        .empty-sub   { font-size: 0.82em; line-height: 1.65; }

        /* Footer */
        .test-footer { background: white; border-top: 1px solid #e1e8ed; height: 52px; display: flex; align-items: center; padding: 0 16px; gap: 8px; flex-shrink: 0; }
        .counter { flex: 1; text-align: center; font-size: 0.79em; color: #7f8c8d; }
        .fbt { padding: 8px 15px; border-radius: 7px; font-size: 0.81em; font-weight: 600; cursor: pointer; border: 1.5px solid #d5d8dc; background: white; color: #2c3e50; }
        .fbt:hover:not(:disabled) { background: #f4f6f7; }
        .fbt:disabled { opacity: 0.3; cursor: default; }
        .fbt.primary { background: #2c3e50; color: white; border-color: #2c3e50; }
        .fbt.primary:hover:not(:disabled) { background: #1a252f; }
        .fbt.flag { border-color: #f39c12; color: #b7950b; background: white; }
        .fbt.flag.on { background: #fef9e7; }
        .fbt.submit { background: #27ae60; color: white; border-color: #27ae60; }
        .fbt.submit:hover:not(:disabled) { background: #219a52; }
        .fbt.report-err { border-color: #e74c3c; color: #c0392b; }
        .fbt.report-err:hover:not(:disabled) { background: #fdf2f2; }
        .fbt.report-err.logged { background: #fdf2f2; }

        /* Error log modal */
        .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1000; align-items: center; justify-content: center; }
        .modal-bg.open { display: flex; }
        .modal-box { background: white; border-radius: 12px; width: min(680px,95vw); max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 8px 40px rgba(0,0,0,0.25); }
        .modal-head { padding: 16px 20px; border-bottom: 1px solid #e1e8ed; display: flex; align-items: center; gap: 10px; }
        .modal-head h2 { flex: 1; font-size: 0.95em; font-weight: 700; color: #2c3e50; }
        .modal-close { border: none; background: none; font-size: 1.3em; cursor: pointer; color: #95a5a6; line-height: 1; }
        .modal-close:hover { color: #2c3e50; }
        .modal-body { overflow-y: auto; padding: 16px 20px; flex: 1; }
        .err-empty { text-align: center; color: #aab7c4; padding: 40px 0; font-size: 0.88em; }
        .err-item { border: 1px solid #e1e8ed; border-radius: 8px; padding: 0; margin-bottom: 10px; display: flex; align-items: stretch; overflow: hidden; }
        .err-item-link { flex: 1; padding: 12px 14px; cursor: pointer; transition: background 0.15s; }
        .err-item-link:hover { background: #f0f7ff; }
        .err-item-meta { font-size: 0.7em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #aab7c4; margin-bottom: 5px; }
        .err-item-stem { font-size: 0.85em; color: #2c3e50; line-height: 1.6; margin-bottom: 4px; }
        .err-item-note { font-size: 0.75em; color: #aab7c4; }
        .err-item-del { border: none; background: none; border-left: 1px solid #e1e8ed; padding: 0 14px; cursor: pointer; color: #bdc3c7; font-size: 1em; flex-shrink: 0; transition: color 0.15s, background 0.15s; }
        .err-item-del:hover { color: #e74c3c; background: #fdf2f2; }
        .modal-foot { padding: 12px 20px; border-top: 1px solid #e1e8ed; display: flex; justify-content: flex-end; gap: 8px; }
        .btn-clear-log { padding: 7px 14px; border-radius: 7px; border: 1.5px solid #e74c3c; background: white; color: #c0392b; font-size: 0.8em; font-weight: 600; cursor: pointer; }
        .btn-clear-log:hover { background: #fdf2f2; }

        /* Mobile question strip */
        .mobile-strip { display: none; }
        @media (max-width: 640px) {
            .nav-panel { display: none; }
            .mobile-strip { display: flex; align-items: center; background: #f0f2f5; border-bottom: 1px solid #dde3ea; padding: 6px 10px; gap: 5px; overflow-x: auto; flex-shrink: 0; -webkit-overflow-scrolling: touch; }
            .mobile-strip .q-dot { width: 28px; height: 28px; min-width: 28px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 0.72em; font-weight: 700; cursor: pointer; border: 1.5px solid #d5d8dc; background: white; color: #95a5a6; flex-shrink: 0; }
            .mobile-strip .q-dot.correct  { border-color: #27ae60; background: #27ae60; color: white; }
            .mobile-strip .q-dot.wrong    { border-color: #e74c3c; background: #e74c3c; color: white; }
            .mobile-strip .q-dot.flagged  { border-color: #f39c12; background: #fef9e7; color: #f39c12; }
            .mobile-strip .q-dot.current:not(.correct):not(.wrong):not(.flagged) { background: #2c3e50; border-color: #2c3e50; color: white; }
            .mobile-strip .q-dot.current  { outline: 2px solid #2c3e50; outline-offset: 2px; }
            .rc-split { flex-direction: column; }
            .passage-col { width: 100%; max-height: 38vh; }
            .single-panel, .ds-panel { padding: 16px 18px; }
            .filter-bar { gap: 8px; }
        }
    </style>
</head>
<body>

<div class="test-header">
    <a class="back-btn" href="index.html">← GMAT</a>
    <span class="sep">|</span>
    <span class="test-logo">Practice</span>
    <div class="section-label" id="section-label">All Sections</div>
    <button onclick="showErrorLog()" style="background:none;border:none;cursor:pointer;font-size:0.75em;color:rgba(255,255,255,0.5);padding:4px 8px;border-radius:4px;" title="View error log" onmouseover="this.style.color='white'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">Error Log</button>
    <span class="timer-label">⏱</span>
    <div class="timer" id="timer" onclick="toggleTimer()" title="Click to pause / resume">00:00</div>
</div>

<div class="filter-bar">
    <div class="fgroup">
        <span class="flabel">Section</span>
        <select class="fsel" id="sel-section" onchange="onSectionChange()">
            <option value="all">All Sections</option>
            <option value="verbal">Verbal</option>
            <option value="quant">Quantitative</option>
            <option value="di">Data Insights</option>
        </select>
    </div>
    <div class="fgroup">
        <span class="flabel">Topic</span>
        <select class="fsel" id="sel-topic" onchange="applyFilters()">
            <option value="all">All Topics</option>
        </select>
    </div>
    <div class="fgroup">
        <span class="flabel">Status</span>
        <select class="fsel" id="sel-status" onchange="applyFilters()">
            <option value="all">All</option>
            <option value="unanswered">Unanswered</option>
            <option value="correct">Correct</option>
            <option value="incorrect">Incorrect</option>
        </select>
    </div>
    <div class="diff-btns">
        <button class="diff-btn active" onclick="setDiff(this,'all')">All</button>
        <button class="diff-btn" onclick="setDiff(this,'easy')">Easy</button>
        <button class="diff-btn" onclick="setDiff(this,'medium')">Medium</button>
        <button class="diff-btn" onclick="setDiff(this,'hard')">Hard</button>
    </div>
</div>

<div class="mobile-strip" id="mobile-strip"></div>

<div class="test-body">
    <div class="nav-panel">
        <div class="nav-title">Questions</div>
        <div class="q-grid" id="q-grid"></div>
        <div class="nav-legend">
            <div class="leg"><div class="leg-dot" style="background:#27ae60"></div>Correct</div>
            <div class="leg"><div class="leg-dot" style="background:#e74c3c"></div>Wrong</div>
            <div class="leg"><div class="leg-dot" style="background:#f39c12"></div>Flagged</div>
            <div class="leg"><div class="leg-dot" style="background:#e1e8ed"></div>Unanswered</div>
        </div>
    </div>
    <div class="q-area" id="q-area">
        <div class="empty-state">
            <div class="empty-icon">📋</div>
            <div class="empty-title">Choose a section to begin</div>
            <div class="empty-sub">Use the filters above to select a section and topic,<br>then work through questions in GMAT Focus Edition format.</div>
        </div>
    </div>
</div>

<div class="test-footer">
    <button class="fbt flag"       id="btn-flag"   onclick="toggleFlag()"   disabled>🚩 Flag</button>
    <button class="fbt report-err" id="btn-report" onclick="reportError()"  disabled title="Report a problem with this question">Log Error</button>
    <button class="fbt"            id="btn-back"   onclick="navigate(-1)"   disabled>← Back</button>
    <div class="counter" id="counter">Select a section above</div>
    <button class="fbt submit" id="btn-submit" onclick="submitAnswer()" style="display:none" disabled>Submit</button>
    <button class="fbt primary" id="btn-next"  onclick="navigate(1)"    disabled>Next →</button>
</div>

<!-- Error Log Modal -->
<div class="modal-bg" id="err-modal" onclick="closeErrModal(event)">
    <div class="modal-box">
        <div class="modal-head">
            <h2>⚠ Flagged Error Questions</h2>
            <button class="modal-close" onclick="closeErrModalDirect()">✕</button>
        </div>
        <div class="modal-body" id="err-modal-body"></div>
        <div class="modal-foot">
            <button class="btn-clear-log" onclick="clearErrorLog()">Clear All</button>
        </div>
    </div>
</div>

<script>window.MathJax={tex:{inlineMath:[['\\(','\\)']],displayMath:[['\\[','\\]']]},options:{skipHtmlTags:['script','noscript','style','textarea','pre']}};</script>
<script id="mathjax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<script src="../js/gmat-db.js"></script>
<script src="../js/gmat-db-ttp.js"></script>
<script>
function _typeset(el){if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise([el]);}

// ─── Map GMAT_DB → practice format ───────────────────────────────────────────
const SECTION_FOR = {
  rc:'verbal', cr:'verbal',
  arithmetic:'quant', algebra:'quant', word:'quant',
  statistics:'quant', combinatorics:'quant', geometry:'quant',
  ds:'di', table:'di', graphics:'di', tpa:'di', msr:'di'
};
const TOPIC_NAMES_MAP = {
  rc:'Reading Comprehension', cr:'Critical Reasoning',
  arithmetic:'Arithmetic', algebra:'Algebra', word:'Word Problems',
  statistics:'Statistics', combinatorics:'Combinatorics', geometry:'Geometry',
  ds:'Data Sufficiency', table:'Table Analysis',
  graphics:'Graphics Interpretation', tpa:'Two-Part Analysis',
  msr:'Multi-Source Reasoning'
};
const DS_OPTIONS = [
  'Statement (1) ALONE is sufficient, but statement (2) alone is not sufficient.',
  'Statement (2) ALONE is sufficient, but statement (1) alone is not sufficient.',
  'BOTH statements TOGETHER are sufficient, but NEITHER statement alone is sufficient.',
  'EACH statement ALONE is sufficient.',
  'Statements (1) and (2) TOGETHER are NOT sufficient.'
];

function mapQ(q) {
  const base = {
    id: q.id,
    section:   SECTION_FOR[q.topic] || 'quant',
    topic:     q.topic,
    topicName: TOPIC_NAMES_MAP[q.topic] || q.topic,
    difficulty: q.difficulty.toLowerCase(),
    answer:    q.answer,
    explain:   q.explanation,
    ctx:       q.context
  };
  if (q.type === 'ds') {
    const sep   = q.stem.indexOf('\n\n');
    const stem  = sep >= 0 ? q.stem.slice(0, sep) : q.stem;
    const block = sep >= 0 ? q.stem.slice(sep + 2) : '';
    const stmts = block.split('\n').map(s => s.trim()).filter(Boolean);
    return { ...base, type:'ds', q:stem, statements:stmts, options:DS_OPTIONS };
  }
  if (q.topic === 'rc' && q.context && q.context.type === 'passage') {
    return { ...base, type:'rc', q:q.stem, options:q.choices,
             passage:q.context.text, passageTitle:q.subtopic || 'Reading Passage' };
  }
  if (q.type === 'tpa') {
    return { ...base, type:'tpa', q:q.stem, options:q.choices,
             part1Label:q.part1_label || 'Part 1', part2Label:q.part2_label || 'Part 2' };
  }
  if (q.type === 'yn') {
    return { ...base, type:'yn', q:q.stem, options:q.choices };
  }
  if (q.type === 'dropdown') {
    return { ...base, type:'dropdown', q:q.stem, parts:q.parts, dropdowns:q.dropdowns };
  }
  return { ...base, type:'mcq', q:q.stem, options:q.choices };
}

const _allQ = [
  ...(typeof GMAT_DB     !== 'undefined' ? GMAT_DB     : []),
  ...(typeof GMAT_DB_TTP !== 'undefined' ? GMAT_DB_TTP : [])
];
const QBANK = _allQ.map(mapQ);

// ─── Topic map ───────────────────────────────────────────────────────────────
const TOPIC_MAP = {
  verbal: { rc:'Reading Comprehension', cr:'Critical Reasoning' },
  quant:  { arithmetic:'Arithmetic', algebra:'Algebra', word:'Word Problems',
            statistics:'Statistics', combinatorics:'Combinatorics', geometry:'Geometry' },
  di:     { ds:'Data Sufficiency', table:'Table Analysis',
            graphics:'Graphics Interpretation', tpa:'Two-Part Analysis', msr:'Multi-Source Reasoning' }
};
const SECTION_NAMES = { all:'All Sections', verbal:'Verbal Reasoning', quant:'Quantitative Reasoning', di:'Data Insights' };

// ─── Persistence keys ────────────────────────────────────────────────────────
const LS_ANSWERS = 'gmat_practice_answers';
const LS_FLAGGED = 'gmat_practice_flagged';
const LS_ERRORS  = 'gmat_error_log';

function saveState() {
  try {
    localStorage.setItem(LS_ANSWERS, JSON.stringify(answers));
    localStorage.setItem(LS_FLAGGED, JSON.stringify([...flagged]));
  } catch(e) {}
}

// ─── State ───────────────────────────────────────────────────────────────────
let filteredQs = [], currentIdx = 0;
let answers = {};
let flagged = new Set();
try { answers = JSON.parse(localStorage.getItem(LS_ANSWERS) || '{}'); } catch(e) {}
try { flagged = new Set(JSON.parse(localStorage.getItem(LS_FLAGGED) || '[]')); } catch(e) {}
let activeDiff = 'all', timerSecs = 0, timerOn = false, timerHandle = null;
let tpaSel = [null, null], ynSel = [], ddSel = [];

// ─── Filters ─────────────────────────────────────────────────────────────────
function onSectionChange() {
  const sec = document.getElementById('sel-section').value;
  const sel = document.getElementById('sel-topic');
  sel.innerHTML = '<option value="all">All Topics</option>';
  const pool = sec === 'all' ? TOPIC_MAP : { [sec]: TOPIC_MAP[sec] };
  Object.values(pool).forEach(group =>
    Object.entries(group).forEach(([k, name]) => {
      sel.innerHTML += `<option value="${k}">${name}</option>`;
    })
  );
  applyFilters();
}

function applyFilters() {
  const sec    = document.getElementById('sel-section').value;
  const topic  = document.getElementById('sel-topic').value;
  const status = document.getElementById('sel-status').value;
  filteredQs = QBANK.filter(q => {
    if (sec   !== 'all' && q.section !== sec)   return false;
    if (topic !== 'all' && q.topic   !== topic) return false;
    if (activeDiff !== 'all' && q.difficulty !== activeDiff) return false;
    if (status !== 'all') {
      const answered = answers[q.id] !== undefined;
      const correct  = answered && isCorrect(q);
      if (status === 'unanswered' && answered)  return false;
      if (status === 'correct'    && !correct)  return false;
      if (status === 'incorrect'  && (!answered || correct)) return false;
    }
    return true;
  });
  document.getElementById('section-label').textContent = SECTION_NAMES[sec] || 'All Sections';
  if (!filteredQs.length) { showEmpty('No questions match your filters.'); buildGrid([]); updateFooter(-1); return; }
  currentIdx = 0;
  buildGrid(filteredQs);
  goTo(0);
  if (!timerOn) startTimer();
}

function setDiff(btn, d) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeDiff = d;
  applyFilters();
}

// ─── Navigator ───────────────────────────────────────────────────────────────
function buildGrid(qs) {
  ['q-grid', 'mobile-strip'].forEach(id => {
    const g = document.getElementById(id);
    g.innerHTML = '';
    qs.forEach((q, i) => {
      const d = document.createElement('div');
      d.className = 'q-dot' + (i === currentIdx ? ' current' : '');
      d.textContent = i + 1;
      d.onclick = () => goTo(i);
      g.appendChild(d);
    });
  });
}

function isCorrect(q) {
  const st = answers[q.id];
  if (!st?.submitted) return null;
  if (q.type === 'mcq' || q.type === 'ds' || q.type === 'rc') return st.choice === q.answer;
  if (q.type === 'tpa') return st.part1 === q.answer.part1 && st.part2 === q.answer.part2;
  if (q.type === 'yn')  return Array.isArray(q.answer) && q.answer.every((v,i) => v === st.ynSel[i]);
  if (q.type === 'dropdown') return q.dropdowns && q.dropdowns.every((dd,i) => dd.answer === st.ddSel[i]);
  return null;
}

function refreshGrid() {
  ['q-grid', 'mobile-strip'].forEach(id => {
    document.getElementById(id).querySelectorAll('.q-dot').forEach((d, i) => {
      const q = filteredQs[i];
      if (!q) return;
      d.className = 'q-dot' + (i === currentIdx ? ' current' : '');
      if (flagged.has(q.id)) { d.classList.add('flagged'); return; }
      const c = isCorrect(q);
      if (c === true)  d.classList.add('correct');
      else if (c === false) d.classList.add('wrong');
    });
  });
  // Scroll mobile strip to keep current dot visible
  const stripDot = document.getElementById('mobile-strip').querySelectorAll('.q-dot')[currentIdx];
  if (stripDot) stripDot.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// ─── Navigation ──────────────────────────────────────────────────────────────
function navigate(dir) { const n = currentIdx + dir; if (n >= 0 && n < filteredQs.length) goTo(n); }

function goTo(i) { currentIdx = i; renderQ(i); updateFooter(i); refreshGrid(); }

function updateFooter(i) {
  const back   = document.getElementById('btn-back'),   next   = document.getElementById('btn-next');
  const flag   = document.getElementById('btn-flag'),   submit = document.getElementById('btn-submit');
  const report = document.getElementById('btn-report'), ctr    = document.getElementById('counter');
  if (i < 0 || !filteredQs.length) {
    [back,next,flag,submit,report].forEach(b => b.disabled = true);
    submit.style.display = 'none';
    ctr.textContent = 'Select a section above'; return;
  }
  const q = filteredQs[i];
  back.disabled = (i === 0); next.disabled = (i === filteredQs.length - 1);
  flag.disabled = false;
  flag.classList.toggle('on', flagged.has(q.id));
  report.disabled = false;
  const errLog = getErrorLog();
  report.classList.toggle('logged', errLog.some(e => e.qid === q.id));
  ctr.textContent = `Question ${i + 1} of ${filteredQs.length}`;
  const st = answers[q.id];
  if (st?.submitted) { submit.style.display = 'none'; }
  else { submit.style.display = 'block'; submit.disabled = true; }
}

// ─── Context renderer ────────────────────────────────────────────────────────
function contextHTML(ctx) {
  if (!ctx) return '';
  if (ctx.type === 'passage') return `<div class="ctx-passage">${ctx.text}</div>`;
  if (ctx.type === 'table') {
    let t = `<div class="ctx-table-wrap"><table class="ctx-table"><thead><tr>`;
    ctx.headers.forEach(h => { t += `<th>${h}</th>`; });
    t += `</tr></thead><tbody>`;
    ctx.rows.forEach(row => { t += `<tr>`; row.forEach(c => { t += `<td>${c}</td>`; }); t += `</tr>`; });
    return t + `</tbody></table></div>`;
  }
  if (ctx.type === 'tabs') {
    let out = `<div class="ctx-tabs"><div class="ctx-tab-bar">`;
    ctx.tabs.forEach((tab, i) => { out += `<button class="ctx-tab${i===0?' active':''}" onclick="ctxTab(this,${i})">${tab.label}</button>`; });
    out += `</div>`;
    ctx.tabs.forEach((tab, i) => { out += `<div class="ctx-tab-panel${i===0?' active':''}" data-panel="${i}">${tab.html}</div>`; });
    return out + `</div>`;
  }
  return '';
}

function ctxTab(btn, idx) {
  const tabs = btn.closest('.ctx-tabs');
  tabs.querySelectorAll('.ctx-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  tabs.querySelectorAll('.ctx-tab-panel').forEach(p => p.classList.remove('active'));
  tabs.querySelector(`[data-panel="${idx}"]`).classList.add('active');
}

// ─── Render dispatch ─────────────────────────────────────────────────────────
function renderQ(i) {
  const q = filteredQs[i];
  const area = document.getElementById('q-area');
  // Reset interaction state for this question
  tpaSel = [null, null];
  ynSel  = q.type === 'yn'       ? new Array((q.options||[]).length).fill(null) : [];
  ddSel  = q.type === 'dropdown' ? new Array((q.dropdowns||[]).length).fill(null) : [];
  if      (q.type === 'rc')       renderRC(q, area);
  else if (q.type === 'ds')       renderDS(q, area);
  else if (q.type === 'tpa')      renderTPA(q, area);
  else if (q.type === 'yn')       renderYN(q, area);
  else if (q.type === 'dropdown') renderDropdown(q, area);
  else                            renderSingle(q, area);
  _typeset(area);
}

function metaTag(q) {
  const diff = q.difficulty.charAt(0).toUpperCase() + q.difficulty.slice(1);
  return `<div class="q-meta">Question ${currentIdx + 1} &nbsp;·&nbsp; ${q.topicName} &nbsp;·&nbsp; ${diff}</div>`;
}

function choicesHTML(q) {
  const letters = ['A','B','C','D','E'];
  const st = answers[q.id];
  return (q.options||[]).map((opt, i) => {
    let cls = 'choice';
    if (st?.submitted) {
      if (i === q.answer)       cls += ' right';
      else if (st.choice === i) cls += ' wrong';
    } else if (st?.choice === i) cls += ' sel';
    const handler = st?.submitted ? '' : `onclick="pick('${q.id}',${i})"`;
    return `<div class="${cls}" ${handler}><span class="oval">${letters[i]}</span><span class="choice-text">${opt}</span></div>`;
  }).join('');
}

function explainHTML(q) {
  const st = answers[q.id];
  if (!st?.submitted) return '';
  return `<div class="explain-box show"><div class="explain-label">Explanation</div>${q.explain}</div>`;
}

function renderRC(q, area) {
  area.innerHTML = `<div class="rc-split">
    <div class="passage-col">
      <div class="passage-title">📄 ${q.passageTitle || 'Passage'}</div>
      <div class="passage-text">${q.passage || ''}</div>
    </div>
    <div class="q-col">
      ${metaTag(q)}
      <div class="q-stem">${q.q}</div>
      <div class="choices">${choicesHTML(q)}</div>
      ${explainHTML(q)}
    </div>
  </div>`;
}

function renderSingle(q, area) {
  area.innerHTML = `<div class="single-panel">
    ${metaTag(q)}
    ${contextHTML(q.ctx)}
    <div class="q-stem">${q.q.replace(/\n/g,'<br>')}</div>
    <div class="choices">${choicesHTML(q)}</div>
    ${explainHTML(q)}
  </div>`;
}

function renderDS(q, area) {
  area.innerHTML = `<div class="ds-panel">
    ${metaTag(q)}
    <div class="q-stem">${q.q}</div>
    <div class="statements">${(q.statements||[]).map(s=>`<div class="stmt">${s}</div>`).join('')}</div>
    <div class="ds-note">Determine whether the statements provide enough information to answer the question — you do not need to solve it completely.</div>
    <div class="choices">${choicesHTML(q)}</div>
    ${explainHTML(q)}
  </div>`;
}

function renderTPA(q, area) {
  const st = answers[q.id];
  const locked = !!st?.submitted;
  let rows = '';
  (q.options||[]).forEach((opt, r) => {
    let c0 = 'tpa-cell', c1 = 'tpa-cell';
    let t0 = '○', t1 = '○';
    if (locked) {
      c0 += ' tpa-locked'; c1 += ' tpa-locked';
      if (r === q.answer.part1) { c0 += ' tpa-right'; t0 = '✓'; }
      else if (st.part1 === r)  { c0 += ' tpa-wrong';  t0 = '✗'; }
      if (r === q.answer.part2) { c1 += ' tpa-right'; t1 = '✓'; }
      else if (st.part2 === r)  { c1 += ' tpa-wrong';  t1 = '✗'; }
    } else {
      if (tpaSel[0] === r) { c0 += ' tpa-sel'; t0 = '●'; }
      if (tpaSel[1] === r) { c1 += ' tpa-sel'; t1 = '●'; }
    }
    const a0 = locked ? '' : `onclick="tpaClick(0,${r})"`;
    const a1 = locked ? '' : `onclick="tpaClick(1,${r})"`;
    rows += `<tr><td class="${c0}" ${a0}>${t0}</td><td class="${c1}" ${a1}>${t1}</td><td class="tpa-label">${opt}</td></tr>`;
  });
  area.innerHTML = `<div class="single-panel">
    ${metaTag(q)}
    ${contextHTML(q.ctx)}
    <div class="q-stem">${q.q.replace(/\n/g,'<br>')}</div>
    <table class="tpa-table">
      <thead><tr><th>${q.part1Label}</th><th>${q.part2Label}</th><th>Option</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${explainHTML(q)}
  </div>`;
}

function tpaClick(col, row) {
  tpaSel[col] = row;
  renderTPA(filteredQs[currentIdx], document.getElementById('q-area'));
  document.getElementById('btn-submit').disabled = (tpaSel[0] === null || tpaSel[1] === null);
}

function renderYN(q, area) {
  const st = answers[q.id];
  const locked = !!st?.submitted;
  let rows = '';
  (q.options||[]).forEach((stmt, i) => {
    const sel  = locked ? st.ynSel[i] : ynSel[i];
    const ans  = Array.isArray(q.answer) ? q.answer[i] : null;
    let yc = 'yn-btn', nc = 'yn-btn';
    if (locked) {
      if (sel === 'Yes') yc += (ans === 'Yes' ? ' yn-right' : ' yn-wrong');
      if (sel === 'No')  nc += (ans === 'No'  ? ' yn-right' : ' yn-wrong');
      if (ans === 'Yes' && sel !== 'Yes') yc += ' yn-right';
      if (ans === 'No'  && sel !== 'No')  nc += ' yn-right';
    } else {
      if (sel === 'Yes') yc += ' yn-sel';
      if (sel === 'No')  nc += ' yn-sel';
    }
    const dis = locked ? 'disabled' : '';
    rows += `<div class="yn-row">
      <span class="yn-stmt">${stmt}</span>
      <div class="yn-btns">
        <button class="${yc}" ${dis} onclick="ynClick(${i},'Yes')">Yes</button>
        <button class="${nc}" ${dis} onclick="ynClick(${i},'No')">No</button>
      </div>
    </div>`;
  });
  area.innerHTML = `<div class="single-panel">
    ${metaTag(q)}
    ${contextHTML(q.ctx)}
    <div class="q-stem">${q.q.replace(/\n/g,'<br>')}</div>
    <div class="yn-list">${rows}</div>
    ${explainHTML(q)}
  </div>`;
}

function ynClick(idx, val) {
  ynSel[idx] = val;
  renderYN(filteredQs[currentIdx], document.getElementById('q-area'));
  document.getElementById('btn-submit').disabled = ynSel.some(v => v === null);
}

function renderDropdown(q, area) {
  const st = answers[q.id];
  const locked = !!st?.submitted;
  let ddIdx = 0, textHTML = '';
  (q.parts||[]).forEach((part, pi) => {
    textHTML += part.replace(/\n/g,'<br>');
    if (pi < (q.dropdowns||[]).length) {
      const dd  = q.dropdowns[ddIdx];
      const sel = locked ? st.ddSel[ddIdx] : ddSel[ddIdx];
      let cls = 'dd-select';
      if (locked) cls += (sel === dd.answer ? ' dd-right' : ' dd-wrong');
      const dis = locked ? 'disabled' : '';
      textHTML += `<select class="${cls}" data-dd="${ddIdx}" onchange="ddChange(this)" ${dis}>
        <option value="">— select —</option>`;
      (dd.options||[]).forEach((opt, oi) => {
        textHTML += `<option value="${oi}" ${sel === oi ? 'selected' : ''}>${opt}</option>`;
      });
      textHTML += `</select>`;
      ddIdx++;
    }
  });
  area.innerHTML = `<div class="single-panel">
    ${metaTag(q)}
    ${contextHTML(q.ctx)}
    <div class="q-stem">${q.q.replace(/\n/g,'<br>')}</div>
    <div class="dd-text">${textHTML}</div>
    ${explainHTML(q)}
  </div>`;
}

function ddChange(sel) {
  const idx = parseInt(sel.dataset.dd);
  ddSel[idx] = sel.value === '' ? null : parseInt(sel.value);
  document.getElementById('btn-submit').disabled = ddSel.some(v => v === null);
}

function showEmpty(msg) {
  document.getElementById('q-area').innerHTML = `<div class="empty-state">
    <div class="empty-icon">🔍</div>
    <div class="empty-title">${msg}</div>
    <div class="empty-sub">Adjust the filters above to see available questions.</div>
  </div>`;
}

// ─── Interaction ─────────────────────────────────────────────────────────────
function pick(qId, choice) {
  if (answers[qId]?.submitted) return;
  if (!answers[qId]) answers[qId] = {};
  answers[qId].choice = choice;
  document.querySelectorAll('.choice').forEach((el, i) => {
    el.className = 'choice' + (i === choice ? ' sel' : '');
  });
  document.getElementById('btn-submit').disabled = false;
}

function submitAnswer() {
  if (!filteredQs.length) return;
  const q = filteredQs[currentIdx];
  const st = answers[q.id] || {};
  if ((q.type === 'mcq' || q.type === 'ds' || q.type === 'rc') && st.choice === undefined) return;
  if (q.type === 'tpa' && (tpaSel[0] === null || tpaSel[1] === null)) return;
  if (q.type === 'yn' && ynSel.some(v => v === null)) return;
  if (q.type === 'dropdown' && ddSel.some(v => v === null)) return;

  answers[q.id] = { ...st, submitted: true };
  if (q.type === 'tpa')      { answers[q.id].part1 = tpaSel[0]; answers[q.id].part2 = tpaSel[1]; }
  if (q.type === 'yn')       { answers[q.id].ynSel = [...ynSel]; }
  if (q.type === 'dropdown') { answers[q.id].ddSel = [...ddSel]; }

  saveState();
  renderQ(currentIdx);
  refreshGrid();
  document.getElementById('btn-submit').style.display = 'none';
}

function toggleFlag() {
  if (!filteredQs.length) return;
  const q = filteredQs[currentIdx];
  flagged.has(q.id) ? flagged.delete(q.id) : flagged.add(q.id);
  document.getElementById('btn-flag').classList.toggle('on', flagged.has(q.id));
  saveState();
  refreshGrid();
}

// ─── Timer ───────────────────────────────────────────────────────────────────
function startTimer() {
  if (timerHandle) clearInterval(timerHandle);
  timerOn = true;
  document.getElementById('timer').classList.remove('paused');
  timerHandle = setInterval(() => {
    timerSecs++;
    const m = String(Math.floor(timerSecs/60)).padStart(2,'0');
    const s = String(timerSecs%60).padStart(2,'0');
    document.getElementById('timer').textContent = `${m}:${s}`;
  }, 1000);
}

function toggleTimer() {
  if (timerOn) { clearInterval(timerHandle); timerOn = false; document.getElementById('timer').classList.add('paused'); }
  else startTimer();
}

// ─── Error log ───────────────────────────────────────────────────────────────
function getErrorLog() {
  try { return JSON.parse(localStorage.getItem(LS_ERRORS) || '[]'); } catch(e) { return []; }
}

function reportError() {
  if (!filteredQs.length) return;
  const q = filteredQs[currentIdx];
  const log = getErrorLog();
  if (log.some(e => e.qid === q.id)) {
    // Already logged — open the modal instead
    showErrorLog(); return;
  }
  const entry = {
    qid:       q.id,
    topic:     q.topicName,
    difficulty: q.difficulty,
    stem:      q.q.replace(/<[^>]+>/g,'').slice(0, 200),
    date:      new Date().toISOString()
  };
  log.push(entry);
  try { localStorage.setItem(LS_ERRORS, JSON.stringify(log)); } catch(e) {}
  document.getElementById('btn-report').classList.add('logged');
  document.getElementById('btn-report').title = 'Already reported — click to view log';
}

function showErrorLog() {
  const log = getErrorLog();
  const body = document.getElementById('err-modal-body');
  if (!log.length) {
    body.innerHTML = '<div class="err-empty">No errors logged yet.</div>';
  } else {
    body.innerHTML = log.slice().reverse().map(e => {
      const d = new Date(e.date);
      const ds = d.toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'});
      const qExists = QBANK.some(q => q.id === e.qid);
      const clickable = qExists ? `onclick="goToErrorQuestion('${e.qid}')"` : '';
      const hint = qExists ? '<span style="font-size:0.72em;color:#2980b9;margin-left:6px;">→ Go to question</span>' : '';
      return `<div class="err-item">
        <div class="err-item-link" ${clickable}>
          <div class="err-item-meta">${e.topic} &nbsp;·&nbsp; ${e.difficulty} &nbsp;·&nbsp; ${ds}${hint}</div>
          <div class="err-item-stem">${e.stem}${e.stem.length >= 200 ? '…' : ''}</div>
        </div>
        <button class="err-item-del" onclick="deleteErrorEntry('${e.qid}')" title="Remove from log">✕</button>
      </div>`;
    }).join('');
  }
  document.getElementById('err-modal').classList.add('open');
}

function deleteErrorEntry(qid) {
  let log = getErrorLog().filter(e => e.qid !== qid);
  try { localStorage.setItem(LS_ERRORS, JSON.stringify(log)); } catch(e) {}
  if (filteredQs.length) updateFooter(currentIdx);
  showErrorLog(); // re-render modal
}

function goToErrorQuestion(qid) {
  // Find the question in QBANK
  const q = QBANK.find(q => q.id === qid);
  if (!q) return;

  // Set section + topic filters to match the question
  const secSel   = document.getElementById('sel-section');
  const topicSel = document.getElementById('sel-topic');
  secSel.value = q.section;
  onSectionChange(); // rebuilds topic dropdown for this section
  topicSel.value = q.topic;

  // Reset difficulty filter to 'all' so the question is always visible
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.diff-btn[onclick*="all"]').classList.add('active');
  activeDiff = 'all';

  applyFilters(); // rebuilds filteredQs

  // Navigate to the question
  const idx = filteredQs.findIndex(fq => fq.id === qid);
  if (idx >= 0) goTo(idx);

  closeErrModalDirect();
}

function closeErrModal(e) {
  if (e.target === document.getElementById('err-modal')) closeErrModalDirect();
}
function closeErrModalDirect() {
  document.getElementById('err-modal').classList.remove('open');
}

function clearErrorLog() {
  if (!confirm('Clear all reported errors?')) return;
  localStorage.removeItem(LS_ERRORS);
  document.getElementById('err-modal-body').innerHTML = '<div class="err-empty">No errors logged yet.</div>';
  // Refresh report button state
  if (filteredQs.length) updateFooter(currentIdx);
}

onSectionChange();
</script>
</body>
</html>
