<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Languages — Study Hub</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1a252f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="../icon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a252f;
      color: white;
      padding: 28px 20px 24px;
      text-align: center;
      position: relative;
    }
    header h1 { font-size: 1.3em; letter-spacing: 2px; text-transform: uppercase; }
    header p  { font-size: 0.78em; opacity: 0.5; margin-top: 3px; letter-spacing: 1px; }
    .back {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.88em;
    }
    .back:hover { color: white; }

    .hub {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 60px;
      gap: 14px;
      max-width: 520px;
      margin: 0 auto;
      width: 100%;
    }

    .hub-card {
      width: 100%;
      background: white;
      border-radius: 18px;
      padding: 24px 24px;
      display: flex;
      align-items: center;
      gap: 18px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      border-left: 5px solid transparent;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .hub-card:active { transform: scale(0.97); }
    .hub-card:hover  { box-shadow: 0 6px 28px rgba(0,0,0,0.12); }
    .hub-card.disabled { opacity: 0.45; pointer-events: none; }

    .hub-card.spanish { border-left-color: #c0392b; }
    .hub-card.dutch   { border-left-color: #e67e22; }

    .hub-icon {
      width: 54px; height: 54px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7em; flex-shrink: 0;
    }
    .spanish .hub-icon { background: #fdedec; }
    .dutch   .hub-icon { background: #fef5e7; }

    .hub-text { flex: 1; }
    .hub-text h2 { font-size: 1.05em; font-weight: 700; color: #2c3e50; margin-bottom: 3px; }
    .hub-text p  { font-size: 0.8em; color: #7f8c8d; }

    .hub-arrow { margin-left: auto; color: #bdc3c7; font-size: 1.3em; flex-shrink: 0; }

    .soon-badge {
      font-size: 0.68em; font-weight: 700; padding: 3px 9px;
      border-radius: 10px; background: #f0f2f5; color: #95a5a6;
      white-space: nowrap; flex-shrink: 0;
    }
  </style>
</head>
<body>

<header>
  <a class="back" href="../index.html">← Home</a>
  <h1>Languages</h1>
  <p>Pick a language to study</p>
</header>

<div class="hub">

  <a class="hub-card spanish" href="../spanish/index.html">
    <div class="hub-icon">🇪🇸</div>
    <div class="hub-text">
      <h2>Spanish</h2>
      <p>Vocabulary · Flashcards · Lessons</p>
    </div>
    <div class="hub-arrow">›</div>
  </a>

  <div class="hub-card dutch disabled">
    <div class="hub-icon">🇳🇱</div>
    <div class="hub-text">
      <h2>Dutch</h2>
      <p>Coming soon</p>
    </div>
    <span class="soon-badge">Soon</span>
  </div>

</div>

<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js');
</script>
</body>
</html>
