<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a252f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Study Hub">
    <link rel="apple-touch-icon" href="icon.svg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1a252f;
            color: white;
            padding: 40px 20px 32px;
            text-align: center;
        }
        header h1 {
            font-size: 1.6em;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        header p { font-size: 0.85em; opacity: 0.5; letter-spacing: 1px; }

        .hub {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 20px;
            max-width: 520px;
            margin: 0 auto;
            width: 100%;
        }

        .hub-card {
            width: 100%;
            background: white;
            border-radius: 18px;
            padding: 32px 28px;
            display: flex;
            align-items: center;
            gap: 22px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-left: 5px solid transparent;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .hub-card:active { transform: scale(0.97); }
        .hub-card:hover  { box-shadow: 0 6px 28px rgba(0,0,0,0.13); }

        .hub-card.math    { border-left-color: #2980b9; }
        .hub-card.gmat    { border-left-color: #e67e22; }
        .hub-card.spanish { border-left-color: #c0392b; }

        .hub-icon {
            width: 58px; height: 58px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8em;
            flex-shrink: 0;
        }
        .math    .hub-icon { background: #eaf4fb; }
        .gmat    .hub-icon { background: #fef5e7; }
        .spanish .hub-icon { background: #fdedec; }

        .hub-text h2 { font-size: 1.15em; font-weight: 700; color: #2c3e50; margin-bottom: 4px; }
        .hub-text p  { font-size: 0.82em; color: #7f8c8d; }

        .hub-arrow { margin-left: auto; color: #bdc3c7; font-size: 1.4em; flex-shrink: 0; }

        footer {
            text-align: center;
            padding: 24px;
            color: #bdc3c7;
            font-size: 0.75em;
        }
    </style>
</head>
<body>

<header>
    <h1>Study Hub</h1>
    <p>Choose a subject</p>
</header>

<div class="hub">

    <a class="hub-card math" href="math/index.html">
        <div class="hub-icon">📐</div>
        <div class="hub-text">
            <h2>Math for ML</h2>
            <p>Luis Serrano · Linear Algebra · PCA</p>
        </div>
        <div class="hub-arrow">›</div>
    </a>

    <a class="hub-card gmat" href="gmat/index.html">
        <div class="hub-icon">📝</div>
        <div class="hub-text">
            <h2>GMAT</h2>
            <p>Quant · Verbal · Data Insights · Practice</p>
        </div>
        <div class="hub-arrow">›</div>
    </a>

    <a class="hub-card spanish" href="spanish/index.html">
        <div class="hub-icon">🇪🇸</div>
        <div class="hub-text">
            <h2>Spanish</h2>
            <p>Coming soon</p>
        </div>
        <div class="hub-arrow">›</div>
    </a>

</div>

<footer>Study Hub</footer>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
